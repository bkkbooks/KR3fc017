body:
  text: 立天元一爲乙截矢如積求之得六十爲益實一十六爲従方一爲益隅平方開之得乙截矢今有大小圎田各一段共地六畝六十四分畝之六十一只云小圎徑如大圎徑八分之五今於二圎従邊各截一弧共積二百二十二步半其小弧矢不及大弧矢三步問二弧矢各幾何答曰截大弧矢八步截弦三十二步截小弧矢五步截弦二十步術曰立天元一爲大圎徑如積求之得一千六百爲益實一爲従隅平方開之得大圎徑四十步五之八而一即小圎徑又立天元一爲截小矢如積求之得四億三千二百九十一萬五千一百二十五爲正實四千一百四十三萬八百爲益方一千二百六十萬一千四百五十爲益上廉二十二萬六千一百五十四爲益二廉一十八萬七千五百一十一爲従三廉五千七百二爲従四廉七百五十三爲益五廉一十四爲益下廉一爲正隅七乘方開之得截小矢五步倍之以減小圎徑餘自之以截小圎
