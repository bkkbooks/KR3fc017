body:
  text: 立天元一為乙截矢如積求之得六十為益實一十六為從方一為益隅平方開之得乙截矢今有大小圎田各一段共地六畝六十四分畝之六十一只云小圎徑如大圎徑八分之五今於二圎從邊各截一弧共積二百二十二步半其小弧矢不及大弧矢三步問二弧矢各幾何答曰截大弧矢八步截弦三十二步截小弧矢五步截弦二十步術曰立天元一為大圎徑如積求之得一千六百為益實一為從隅平方開之得大圎徑四十步五之八而一即小圎徑又立天元一為截小矢如積求之得四億三千二百九十一萬五千一百二十五為正實四千一百四十三萬八百為益方一千二百六十萬一千四百五十為益上廉二十二萬六千一百五十四為益二廉一十八萬七千五百一十一為從三廉五千七百二為從四廉七百五十三為益五廉一十四為益下廉一為正隅七乘方開之得截小矢五步倍之以減小圎徑餘自之以截小圎
