body:
  text: 子一十三箇加二即日數米求日術曰立天元一為三角嵐峯底子如積求之得五千三百六十七萬四千九百二十為益實七萬三千三百八十六為従方三萬六千七百三十五為従上廉七千九百五十為従二廉七百五為従下廉二十四為従隅四椉方開之得三角嵐峯底子一十三箇加二即日數合問求日術曰今有官司依立方招兵初招方靣三尺次招方靣轉多一尺每人日支錢二百五十文巳招二萬三千四百人支錢二萬三千四百六十二貫問招來幾日答曰一十五日術曰立天元一為三角落一底子如積求之得九萬二千七百三十六為益實六百六十為従方一百八十一為従上廉二十二為従下廉一為正隅三椉方開之得三角落一底子一十二箇加三即日數錢求日數日立天元一為三角撒星底子如積求之得五百六十一萬八百四十為益實一萬八千三百六十二為従方六十三百九十為従上廉一千七十五為従二廉
