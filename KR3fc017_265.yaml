body:
  text: 今有圎材徑三尺只云鋸道長一尺八寸問深幾何答曰三寸術曰立天元一為鋸深如積求之得八十一為正實三十為益方一為正隅平方開之合問今有天上雁三群地上雁一群共三百一隻只云頭群次群共二百五十六隻又以次群除頭群所得加地上雁與末群同地上雁不及次群四十三隻問四群各幾何答曰頭群一百九十二隻次群六十四隻末群二十四隻地上二十一隻術曰立天元一為次群雁如積求之得一百二十八為正實六十六為益方一為正隅平方開之得次群雁合問今有徽術弧田一畝一百七十二步只云矢不及弦五十步問弦矢各幾何答曰弦六十步矢一十步術曰立天元一為弦如積求之得三十三萬四千八百為正實三萬為益方四百七為從隅平方開之得弦合問
  hash: sha256:d71b8c10c3f7a80cc32d948b79d47e61885d28a4b2cb9585a70fb1e65c7db4a3
