body:
  text: 減靣問幂餘二萬一千二百八十三闊步五分步之一問每靣闊幾何答曰一十二步術曰立天元一為每靣之闊如積求之得一十萬六千四百一十六為益實一十九為從上廉五為正隅三乘方開之得每靣之闊也今有三廣田積加中廣二分之一減大廣三分之二又加小廣四分之三減正長六分之五餘以正長中半乘之得一萬五千八百八十八步只云併三廣正長虛加二為實四為從方一為從廉一為從隅立方開之併入中廣與小廣等又開方數如中廣三分之一大小廣差二步問長廣各幾何答曰小廣十六步中廣十二步大廣十八步正長四十八步術曰立天元一為開方數如積求之得一十九萬六百五十六為益實二百三十六為從方一千九為從止廉九百八為從二廉四百二十五
