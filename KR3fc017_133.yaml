body:
  text: 寔二十八益方四従亷一従隅立方開之合問今有直積十二步只云勾弦和八步問勾弦較幾何答曰二步術曰立天元一為勾弦較如積求之得七十二為益實六十四為従方一十六為益亷一為正隅立方開之合問今有直積一十二步只云勾弦和八步問股弦較幾何答曰一步術曰立天元一為股弦較如積求之得九為正寔二十八為益方二十為従亷一為益隅立方開之合問今有直積一十二步只云勾弦和八步問弦和較幾何答曰二步術曰立天元一為弦和較如積求之得七十二為正實七十二為益方一十六為従亷一為正隅立方開之合問今有直積一十二步只云勾弦和八步問弦較較幾何
