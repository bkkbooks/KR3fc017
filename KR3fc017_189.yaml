body:
  text: 四爲従上廉二百九十六爲従下廉五爲益隅三乘方開之得截矢二步自之以減倍積餘以矢除之即弦合問今有圎田一段周二百六十七步今従邊截一弧計積一千三百一十二步中半步問截弦矢各幾何答曰截矢二十五步截弦八十步術曰立天元一爲截矢如積求之得六百八十九萬六百二十五爲正實五千二百五十爲益上廉三百五十六爲益下廉五爲正隅三乘方開之得截矢合問今有圎田一段徑九十步甲乙共截一弧其甲従邊復截一弧以次給乙甲截積二百八十三步二分步之一乙截積五百二十六步二分步之一問甲乙各截弦矢幾何荅曰甲截矢九步截弦五十四步乙截矢九步截弦七十二步術曰立天元一爲甲截矢如積求之得三十二萬一千四百八十九爲正實一千一百三十四
