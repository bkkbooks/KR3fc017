body:
  text: 一氣混元今有黄方椉直積得二十四步只云股弦和九步問句幾何荅曰三步草曰立天元一為句如積求之得一百六十二筒黄方椉直積式以一百六十二椉元積相消得開方式四椉方開之得句三步合問細草曰立天元一為句自之太合以股弦和除之為股弦較今不受除即以為帶分股弦較置股弦和九步亦以九椉之得八十一步為帶分股弦和俱帶九為分母和較相加得為帶分弦相減得為帶分股以十八乗天元得為帶分句俱帶十八為分母句股相乗又以帶分黄方得椉之得三十六約之得為一百六十二箇黄方椉直積式寄左乃置元積二十四步以一百六十二椉之得三千八百八十八步與左相消得四椉方開之得句三步合問
  hash: sha256:bd802f30bb1f4d2aff6926c3424f356012988b53713c5bfa0b8dc4b1770b9781
