body:
  text: 一氣混元今有黃方乘直積得二十四步只云股弦和九步問句幾何答曰三步草曰立天元一為句如積求之得一百六十二筒黃方乘直積式以一百六十二乘元積相消得開方式四乘方開之得句三步合問細草曰立天元一為句自之太合以股弦和除之為股弦較今不受除即以為帶分股弦較置股弦和九步亦以九乘之得八十一步為帶分股弦和俱帶九為分母和較相加得為帶分弦相減得為帶分股以十八乘天元得為帶分句俱帶十八為分母句股相乘又以帶分黃方得乘之得三十六約之得為一百六十二箇黃方乘直積式寄左乃置元積二十四步以一百六十二乘之得三千八百八十八步與左相消得四乘方開之得句三步合問
  hash: sha256:b02febb28c978225cf3c9bb1378921c8da92258dfa7515d0ab6f67bfa8582e8c
