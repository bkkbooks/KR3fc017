body:
  text: 松庭先生四元玉鑑序原本行二十字黄帝九昌以降算經多矣不可枚舉唐宋設明算科立法取士不出九章周髀海島孫子張丘建夏侯陽五曹五經算緝古綴術數家而巳然天地人物四元罔有云及一者厥後平陽蔣周撰盖古博陸李文一撰照瞻底泉石信道撰鈴經平水劉汝諧撰如積釋鎻𨦟人元裕細草之後人始知有天元也平陽李德載因撰兩儀群英集臻兼有地元霍山邢先生頌不髙弟劉大鑑潤夫撰乾坤括嚢末僅有入元二問吾友燕山朱漢卿先生演數有年探三才之頣索九章之隱按天地人物立成四元以元氣居中立天句地股人弦物黄方考啚明之上升上降左進右退互通變化乗除徃來用假象真以虗間實錯正負分成四式必以寄之剔之餘籌易位橫衝直撞精而不雜自然而然消而和會以成開方之式也書成名曰四元玉鑑𨤲為三卷以象三才四元以象其時分門二十有四以象其氣立問二百八十有八假象周天之數玉者比漢卿之德術動則其聲清墟以長静則夫尹旁達而不有隐翳鑑去照
  hash: sha256:4d50d099be804b5b0cfb6417b41653c03eb80cbeefc66510bd2f6c4fe37b0c4c
