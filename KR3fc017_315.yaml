body:
  text: 四元之形象收則其緼照徹而明開則縱橫發揮而曲盡妙理矣漢卿名世傑松庭其自號也周流四方復遊廣陵踵門而學者雲集大德巳亥編集算學啓蒙趙元鎮巳與之板而行矣元鎮者博雅之士也惠然又備巳財鳩工繡梓俾之兹行于世前成始而今成終也好事之德奚可量哉二書相為表裏不其韙歟屬余詳觀之有素所未嘗接於耳目者不用而用以之通非數之數以之成由是而知有數皆從無數中來髙邁於前賢能盡以矣明算君子據余言試為細草然後知誠而不妄也於是乎書大德登科二月甲子滹納心齊祖頤李賢父序道灮癸未三月從王北堂獲見此書許借録先勒名卷末以志欣幸邵陽魏原識甲甲十二月十八日徐星伯借鈔畢是夜雪重獲此書燈下對之一大快事嘉慶草四年七月從順德黎見山鈔
