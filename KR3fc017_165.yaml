body:
  text: 或問一隻銀盤三尺周內容三隻水晶毬𠰥人算答得穿以徑萬兩黃金也合酬答曰五寸六十九分寸之二十五術曰立天元一為毬子徑如積求之得三百為益實六十為從方一為正隅平方開之得毬子徑四寸不盡命分以減盤徑合問或問積減弦長與半平餘與三句五股停句弦股弦差相併要作原長少半平答曰句八步股一十五步弦一十七步術曰立天元一為句地元一為股人元一為弦三才相配求之得四百八十為益實六十為從方開無餘平方而一得句開地元股得四百八十為益實三十二為從方上實下法除之得股開人元弦得五百一十為益實三十為從方開無隅平方除之得弦合問茭草形段七問今有茭草六百八十朿欲令落一形埵之問底子幾何答曰一十五朿術曰立天元一為落一底子如積求之得四十
