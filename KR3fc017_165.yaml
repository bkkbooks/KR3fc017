body:
  text: 或問一隻銀盤三尺周內容三隻水晶毬𠰥人筭答得穿以徑萬兩黄金也合酬答曰五寸六十九分寸之二十五術曰立天元一爲毬子徑如積求之得三百爲益實六十爲従方一爲正隅平方開之得毬子徑四寸不盡命分以減盤徑合問或問積減弦長與半平餘與三句五股停句弦股弦差相併要作原長少半平答曰句八步股一十五步弦一十七步術曰立天元一爲句地元一爲股人元一爲弦三才相配求之得四百八十爲益實六十爲従方開無餘平方而一得句開地元股得四百八十爲益實三十二爲従方上實下法除之得股開人元弦得五百一十爲益實三十爲従方開無隅平方除之得弦合問茭草形段七問今有茭草六百八十朿欲令落一形埵之問底子幾何答曰一十五朿術曰立天元一爲落一底子如積求之得四十
