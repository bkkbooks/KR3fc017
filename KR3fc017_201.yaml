body:
  text: 已招四千九百五十人支米九百三十一碩二斗問招來幾日答曰一十五日術曰立天元一為三角底子如積求之得四千八百四十九為益實四十八為従方一十二為従廉一為従隅立方開之得三角底子一十三箇加二即日數米求日術曰立天元一為三角落一底子如積求之得九萬二千八百二十為益實三百二十八為従方一百二十一為従上廉一十八為従下廉一為従隅三椉方開之得三角落一底子一十三箇加二即日數合問今有官司依平方招兵初段方靣五尺次段方靣轉多一尺每人日給米三升次日轉多三升已招二千四百四十人支米四千四百七十七碩三斗二升問招來幾日答曰一十五日術曰立天元一為三角底子如積求之得一萬四千二百七十四為益實二百五十三為従方三十九為従廉二為従隅立方開之得三角底
  hash: sha256:c15cfc6f4d4681435b7e3f71c906eaf300a4340f9eaad7fe31250839d4480b79
