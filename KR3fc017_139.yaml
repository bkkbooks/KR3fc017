body:
  text: 上亷一為從隅三乘方開之合問今有直積一百二十步只云弦較較乘弦和較得六十步問黃方幾何答曰六步術曰立天元一為黃方如積求之得三十六為益實一為從隅平方開之合問今有直積一百六十八步只云句弦較乘弦和較得一百八步問句弦較幾何答曰一十八步術曰立天元一為句弦較如積求之得一萬四百九十七步六分為益實二百九十一步六分為益上亷一為正隅三乘方開之合問今有直積一百八步只云句弦較乘句股較得一十八步問句幾何答曰九步術曰立天元一為句如積求之得三百七十七萬九千一百三十六為益實六萬九千九百八十四為從上亷二百七為益三亷一為益隅五乘方開之合問今有直積一百六十八步只云股弦較乘句股較
