body:
  text: 答曰平圎徑六尺立圎徑四尺平方靣五尺立方靣三尺術曰先以合分法求之次如方程正負術入之左行得立方積次行得平方積次行得立圎積右行求平圎積併之為共積立天元一為平圎徑如積求之得二千四百八十四為益實七十二為従方三為益亷十為従隅立方開之得平圎徑又立天元一為立圎徑如積求之得三百六十八為益實一十六為従方一為益亷五為正隅立方開之得立圎徑又立天元一為平方靣如積求之得三百九十為益實三十二為従方一十六為益亷五為従隅立方開之得平方靣又立天元一為立方靣如積求之得三百四十八為益實二十九為從方一十四為從亷五為從隅立方開之得立方面合問雜範類會一十三問今有沈香立圓毬一隻徑一尺今従頂截周八寸答曰四分問厚幾何答曰二分術曰立天元一為截頂厚如積求之得一寸九
