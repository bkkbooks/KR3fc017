body:
  text: 等只云長乘和減平與二積一較同問和羃弦羃較羃帶一積一長一平六事連環得幾何答曰九十四步術曰立天元一為句地元一為股人元一為開數三才相配求之得一百八十八為正實九十六為益方一為正隅平方開之合問今有長乘積減二平如平而一所得加二較如長而一減平與一較等只云長乘較減於直積餘以長而一與二較同問積羃和羃長羃平羃較羃帶一和二平三長四較九事連環得幾何答曰二百四十八步術曰立天元一為句地元一為股人元一為開數三才相配求之得七萬九千六百八為正實五百六十九為益方一為正隅平方開之合問今有直積減句股和以句乘之加句股較減直積以股除之加句股和以股乘之加股以句除之減二股一句股較與句等只云句乘股羃以股除之加直積減
