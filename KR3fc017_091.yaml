body:
  text: 答曰上廣一丈下廣一丈八尺髙一丈二尺袤五百八十尺術曰立天元一為堤高如積求之得四萬二十為益實二十五為益方五十二為從上亷五為益下亷二為從隅三乗方開之得堤髙合問今有造仰觀䑓一所只云上下袤差一丈四尺併上下廣虛加二為實六為從方一為從隅平方開之不及上廣八尺上袤多扵上廣二分之一髙多下袤七尺每日用徒二百二十七人每人曰程常積二十四尺五日役畢問䑓上下廣袤及高各幾何答曰上袤二丈四尺下袤三丈八尺上廣一丈二尺下廣二丈六尺高四丈五尺術曰立天元一為䑓之上廣如積求之得七萬七千六百四為益實一千八百一十三為益方五百四十六為益上亷三十一為從下亷六為從隅三乗方開之即䑓上廣合問今有造圓䑓一所只云併上下周髙為實平方除之如上周弱半髙與上下周差同髙多
