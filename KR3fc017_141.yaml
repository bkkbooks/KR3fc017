body:
  text: 得一十八步問弦和和幾何答曰五十六步術曰立天元一爲弦和和如積求之得三十一百三十六為益實一爲従隅平方開之合問今有直積一百八步只云弦較較乗句弦較得七十二步開弦和較幾何答曰六步術曰立天元一爲弦和較如積求之得五千一百八十四爲益實一百四十四為従隅平方開之合問今有直積一百二十步只云股弦和乗句弦較得二百八十八步問黄方幾何答曰六步術曰立天元一爲半黄方如積求之得三千六百爲正實四百九爲益上亷一爲從隅三乗方開之得半黄方面倍之合問今有直積一百二十步只云句弦和乗股弦較得五十步問黄方及句股和各幾何答曰黄方六步句股和二十三步術曰立天元一爲黄方如積求之得五萬七千
