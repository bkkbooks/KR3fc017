body:
  text: 得一十八步問弦和和幾何答曰五十六步術曰立天元一為弦和和如積求之得三十一百三十六為益實一為從隅平方開之合問今有直積一百八步只云弦較較乘句弦較得七十二步開弦和較幾何答曰六步術曰立天元一為弦和較如積求之得五千一百八十四為益實一百四十四為從隅平方開之合問今有直積一百二十步只云股弦和乘句弦較得二百八十八步問黃方幾何答曰六步術曰立天元一為半黃方如積求之得三千六百為正實四百九為益上亷一為從隅三乘方開之得半黃方面倍之合問今有直積一百二十步只云句弦和乘股弦較得五十步問黃方及句股和各幾何答曰黃方六步句股和二十三步術曰立天元一為黃方如積求之得五萬七千
