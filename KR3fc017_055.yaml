body:
  text: 今有梭田積加廣幂減于長幂不足三十六步只云長內虛加一算平方開之得數以減半廣不足四步問長廣各幾何答曰廣十八步術曰立天元一為廣半如積求之得一百八十九為正實二百五十五為益方九十八為從上廉一十七為益下廉一為正隅三乘方開之得半廣合問今有三斜田積減中股餘七十六步只云中斜多于中股九步中股不及小斜二步問中股幾何答曰八步術曰立天元一為中股如積求之得一億三千三百四十四萬八千七百四為益實七百二萬三千六百一十六為益方八十四萬三千二百九十六為從上廉二十七萬八千七百六十八為從二廉五千三百七十一步七分五釐為從三廉四百九十五為益下廉四十九為益隅五乘方開之得中股合問今有句三股四八角田積以靣開三自乘加之𨚫闊
