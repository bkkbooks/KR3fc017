body:
  text: 六百為正實一千六百三十六為益上亷一為正隅三乘方開之得黃方又立天元一為句股和如積求之得一千八百四十為正實八千為益方開無隅平方除之合問今有直積一百八步只云句弦和乘股弦和得六百四十八步問黃方及弦各幾何答曰黃方六步弦一十五步術曰立天元一為黃方如積求之得二萬三千三百二十八為益實六百四十八為從隅平方開之得黃方六步又立天元一為弦如積求之得一千八十為正實七十二為益方上實下法而一得弦合問今有直積一百八步只云五和五較相乘得三千七百八十步問弦幾何答曰一十五步術曰立天元一為弦如積求之得七干九百七十四億九千三百六十五萬六百二十五為益實七十五億二千二百八十四萬二千六百為從上亷二千五十二萬四千九百九十五為益三亷一萬二千六百三十六為從隅五乘方開
