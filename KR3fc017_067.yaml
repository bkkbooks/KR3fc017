body:
  text: 問端長只價各幾何答曰端長五丈二尺尺價六十五文四分文之三術曰立天元一為尺價如積求之得三千四百一十九為益實五百七十八為從方八為益隅平方開之得尺價不盡以連枝同體術求之今有綾一匹直錢一貫五百四十八文只云尺價內減匹長餘以尺價乘之減尺價餘一貫三百一十四文問各幾何答曰匹長二丈八尺三分尺之二尺價五十四文術曰立天元一為尺價如積求尺得二千八百六十二為益實一為益方一為正隅平方開之得尺價合周問今有錦一端直錢四貫八十文只文併尺價端長為共以尺價乘之加端長共得一十一實三百五十三文問各幾何答曰端長四尺丈八尺尺價八十五文術曰立天元一為端長如積求之得一千六百六十四萬六千四百為益實七千二百七十三為從亷一為益隅立方開之得端長合問今有錦一端一匹端長自乘內減匹長又匹長自
