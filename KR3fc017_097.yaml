body:
  text: 為益實一百為從隅平方開之得句不盡按之分法求之合問今有弦六步二分步之一句三步十分步之九問股幾何答曰五步五分步之一術曰立天元一為股如積求之得二千七百四為益實一百為從隅平方開之得股不盡按之分法入之合問今有直積一十八步一十二分步之五只云長取四分之三闊取三分之一為共如長一十七分步之一十六問長平各幾何答曰長五步三分步之二闊三步四分步之三術曰立天元一為長如積求之得三千七百五十七為益實一百一十七為從隅平方開之得長不盡桉之分法求之合問今有直積一百一十步二分步之一只云長平和二十一步一十二分步之五問長平各幾何答曰平八步三分步之二長一十二步四分步之三術曰立天元一為平如積求之得一千三百二十
