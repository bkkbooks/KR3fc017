body:
  text: 寓燕松庭朱世傑漢卿編述臨川琴屋鍾叔明較正直段求源十八問今有弦和和乘三相和加弦冪共得一百六十九步只云弦較較乘弦較和減股弦和乘股弦較餘一十五步問句幾何答曰三步術曰立天元一為句如積求之得二十五萬三千一百二十五為正實八十一萬八千一百為益上廉二十七萬八千九百二十六為從三廉二萬二千八百六十八為益五廉一百八十一為從隅七乘方開之得句合問今有句弦和乘股弦和減句弦較乘股弦較餘七十步只云弦和和乘弦較和得七十二步問股幾何答曰四步術曰立天元一為股如積求之得一百六十七萬九千六百一十六為正實一十八萬六十六百二十四為益上廉六千四百七十九為從三
