body:
  text: 術曰如方程正負術入之左行得小斜中行得中斜右行求大斜立天元一為中股如積求之得一千二百九十六為益實一為正隅平方開之得中股合問今有直田環田各一段共一十三畝四分畝之一只云併環四外周一中周二實徑三與六箇直田斜相較之多六步又併外周二中周一直斜二與六十三箇實徑相較之少二步又併外周二實徑五直斜一與四箇中周相較之多四步又併中周二實徑四直斜一與二箇外周相較之少六步問直田長平各幾何答曰直田長七十步闊二十四步術曰如方程正負術入之左行得直田斜次行得實徑次行得中周右行求外周又環積減共積餘為直積立天元一為闊如積求之得二百八十二萬二千四百為正實五千四百七十六為益上亷一為正隅三乘方開之得闊又立天元一為長如積求之得二百八十二萬二
