body:
  text: 術曰列積四之三而一于上又一磚之積乘合用磚數四之五而一加上為實又城外方身外加四三之加六箇池上廣為池外周又池內周加六箇池下闊為池底外周併而半之為池底停周又併池內外周而半之為池上停周倍之加底停周以上廣乘之于上又倍底停周加上停周以下廣乘之併上如六而一所得為法除實即池深求興功畢日術曰置城積併入合用磚數以二人乘之為實併入日常積及人日燒用磚數以共差夫乘之得數為法實如法而一合問今有仰觀臺一所計積一萬八千五百二十八尺只云併上下袤為實平方開之得數減于上廣不及一丈三尺却于上下袤差同又如髙三分之乙上下廣差六尺欲興功補為圓臺上下斜長就為圓徑限一曰畢役每人常積二十七尺問上下廣袤及高大小四段弧積用徒各幾何答曰上廣二丈一尺下廣二丈七尺上袤二丈八尺
