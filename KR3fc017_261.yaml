body:
  text: 方六十三為正隅平方開之得顆價不盡按之分法求之合問今有人贖解本利共收九貫八百五十文只云利錢平方開之加入本錢共得五貫六百九十文又開方數如日一百二十五分日之一十三月率三十文與日同問本利及日數每貫月利幾何答曰本五貫六百二十五文每貫月利三十六文七十五分文之四二十箇月零二十五日利四貫二百二十五文術曰立天元一為本錢如積求之得三千二百三十六萬六千二百五十為正實一萬一千三百七十九為益方一為正隅平方開之即本錢餘依法求之合問今有錢八貫六百一十二攴巳令五人分之只云乙如甲五分之三丙不及乙一貫八百八十文併甲丙以乙除之所得與戊同丁少如丙七百九十文問各分幾何答曰甲四貫七百文乙二貫八百二十文
