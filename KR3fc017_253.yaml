body:
  text: 千四百為益實五千四百七十六為從上亷一為益隅三乘方開之得長又立天元一為和如積求之得八千八百三十六為益實一為正隅平方開之得和又立天元一為較如積求之得二千一百一十六為益實一為正隅平方開之得較合問今有句股田一段取句弦和一股弦和二句弦較三為共內减股弦較四餘二百六十步又句弦和二股弦和一股弦較三為共內减句弦較四餘七十六步又句弦和三句弦較二股弦較一為共內减股弦和二餘五十五步又股弦和二句弦較一股弦較三為共內减句弦和三餘二十八步問句股弦各幾何答曰句一十二步股三十五步弦三十七步術曰如方程正負術入之左行得股弦次行得句弦較次行得股弦和右行得句弦和立天元一為句如積求之得一百四十四為
  hash: sha256:d092777894edf1b8d9866b9467abbef6633548b9ea04ca7a47040e32ebb97873
