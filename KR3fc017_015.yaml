body:
  text: 四象細草假令之圗一氣混元今有黃方乘直積得二十四步只云股弦和九步問句幾何答曰三步草曰立天元一為句如積求之得一百六十二箇黃方乘直積式以一百六十二乘元積相消得開方式四乘方開之得句三步合問兩儀化元今有股羃減弦較較與股乘句等只云句羃加弦較和與句乘同問股幾何答曰四步草曰立天元一為股也地元一為句弦和天地配合求之求到互隱通分消之得今式云式內二午得外二午得兩位相消得開方式平方開之得股四步合問三才運元
