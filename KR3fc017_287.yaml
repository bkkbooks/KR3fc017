body:
  text: 隅三乘方開之得平合問今有直積加平與二和一較等只云長羃减較羃亦與二和一較等問四事各幾何答曰平三步長四步術曰立天元一為平地元一為長天地配合求之得三為正實二為從方一為益隅平方開之得平又立天元一為長地元一為平求得一十二為益實三為從方開無隅平方而一得長又立天元一為和地元一為平求得七為正實六為從方一為益隅平方開之得和又立天元一為較地元一為長求得三為正實三為益方上實下法而一即較合問今有平乘直積與一長五和等只云長羃加較羃與一長三和等問長平各幾何答曰平三步長五步術曰立天元一為平地元一為長天地配合求之得一百八為益實三十六為從方三十六為從上亷一十二為益二亷三為益下亷一為正隅四乘方開之得平又立天元一為長地元一為平求得五為正實七十六為益方五十五
  hash: sha256:954d2cd70b78f7081109c5b272c3f9b3bdefde4e415100eecd0329b5ddc066aa
