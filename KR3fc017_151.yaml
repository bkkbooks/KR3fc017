body:
  text: 四步八分遥望城西北隅適與西表末相參合問城方去表去城各幾何答曰城方六里三百四十步去表一十里八十五步五分步之一術曰立天元一爲城方如積求之得五千爲正實二爲邑方上實下法而一得城方求表去城者入索乗北行去表以两表相去除之得數爲景差內减東去表餘以爲法又北行去表內减景差餘乗東表退行爲實實如法而一即表法城之逺合問今有營居山頂巖底有泉欲汲而不知其深偃矩山上令句髙四尺従句端望泉入下股六尺又設重矩於上其矩閒相去一丈六尺更從句端望泉入上股五尺六寸問巌深幾何答曰巌深二十二丈術曰立天元一爲巌深如積求之得二十二尺爲正實一寸爲從方上實下法而一即巖深合問今有登山臨邑不知門髙偃矩上山令句髙三尺斜望門額入下股四尺八寸復望門
