body:
  text: 四步八分遙望城西北隅適與西表末相參合問城方去表去城各幾何答曰城方六里三百四十步去表一十里八十五步五分步之一術曰立天元一為城方如積求之得五千為正實二為邑方上實下法而一得城方求表去城者入索乘北行去表以兩表相去除之得數為景差內减東去表餘以為法又北行去表內减景差餘乘東表退行為實實如法而一即表法城之逺合問今有營居山頂巖底有泉欲汲而不知其深偃矩山上令句髙四尺從句端望泉入下股六尺又設重矩於上其矩閒相去一丈六尺更從句端望泉入上股五尺六寸問巖深幾何答曰巖深二十二丈術曰立天元一為巖深如積求之得二十二尺為正實一寸為從方上實下法而一即巖深合問今有登山臨邑不知門髙偃矩上山令句髙三尺斜望門額入下股四尺八寸復望門
  hash: sha256:d598fc44e1b9ad9630d5f2e485e72cf35e7eb5385188cce3699668157f3dc0f2
