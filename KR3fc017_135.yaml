body:
  text: 答曰四步術曰立天元一為弦較較如積求之得一百九十二為益實一百二十八為從方二十四為益亷一為正隅立方開之合問今有直積一十二步只云句弦和八步問句較較幾何答曰二步術曰立天元一為句較較如積求之得八為正實八為從方八為益亷一為正隅立方開之合問今有直積一十二步只云句弦和八步問句股和幾何答曰七步術曰立天元一為句股和如積求之得五百五十三為正實一百為益方四為益亷一為正隅立方開之合問今有直積一十二步只云句弦和八步問股弦和幾何答曰九步術曰立天元一為股弦和如積求之得九為正實一百為益方二十為從亷一為益隅立方開
