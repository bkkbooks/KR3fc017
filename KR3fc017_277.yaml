body:
  text: 亷一百六十八為從下亷五為益隅三乘方開之合問今有句弦相乘比宜積多三步只云股弦相乘比弦少五步問句股幾何答曰句三步股四步術曰立天元一為股地元一為股弦較天地配合求之得一十二為正實三為益方開無隅平方合問今有直積加平减二較以長乘之减積以平除之加二較共得一十五步三分步之一只云平羃减和與二較等問長平各幾何答曰平三步長四步術曰立天元一為長地元一為平天地配合求之得一千八百四十為益實一千六十為從方二百一十為從上亷五十四為益下亷九為益隅三乘方開之得長合問今有直積加句羃减股羃以平乘之减直積與平等只云和减三較以長除之與較同問長平各幾何
