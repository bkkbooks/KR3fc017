body:
  text: 一從隅立方開之併入臺方靣共得一丈一尺臺髙不及池方靣九尺臺方靣羃與外田方同問三方靣及臺髙各幾何答曰田方六十四尺池方二十五尺臺髙一丈六尺臺方八尺術曰立天元一為開方數如積求之得八千一百三十三為正實四千六百九十七為益方五百二十七為正上廉一百二為正二廉二十二為益下廉一為正隅四乘方開之得三尺為開方數合問今有圎田一段內有圎池池中復有圎亭臺各占之三積共九千五百四尺只云臺池二周皆以平方開之相併自之與外田周等其臺周開方數如池周開方數二分之一不及臺髙二尺問三圎周及臺髙各幾何答曰田周三百二十四尺池周一百四十四尺臺周三丈六尺臺髙八尺術曰立天元一為臺髙如積求之得一十一萬
