body:
  text: 為益三廉二百七十七為益四廉四十為從下廉二十一為從隅六乘方開之得四步為開方數今有種金田積加對尖直長得三百一十五步只云外兩斜各長二十五步內兩斜各長二十步問對尖直各幾何答曰一十五步術曰立天元一為對尖直長如積求之得四十四萬七千五百二十五為益實二千五百二十為從方二千四十六為從上廉一為益隅三乘方開之得對尖直長合問今有圎田積加圎徑減圎周餘自乘加徑幂得七千二百步問周徑幾何答曰一十二步術曰立天元一為圎徑如積求之得一十一萬五千二百為益實八十為從上廉四十八為益下廉九為正隅三乘方開之得圎徑合問今有窊田積加窊徑強半減上周太半餘一百三十二步只云窊徑以平方開之併入上周共得四十步問周徑各幾何
