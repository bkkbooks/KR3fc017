body:
  text: 六千六百二十四為正隅平方開之合問今有句弦較乗股弦和加句股和𨳩方得數多股一步只云股弦較乗弦較和减弦開方得數少黄方羃三步問弦和較何答曰二步術曰立天元一為句地元一為股人元一為弦和較三才相配求之得三千五百六十為正實七百六十為従方七千六百九十八為益上亷一千一百三十四為益二亷六千五百二十二為從三亷七百二十為從四亷二千八百二十九為益五亷二百三十三為益六亷六百七十為従七亷三十六為從八亷八十二為益九亷二為益十亷四為正隅十一乗方開之合問四象朝元六問今有五平三長立方開之少股一步只云三和四較平方𨳩之多句二步問弦較較帶黄方二事連環得幾何答曰六步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得三萬九千三
  hash: sha256:f2bf3bec8006d02300653bce37965c770dbf2778e0c1bdad80ba2f8f6b24a6f7
