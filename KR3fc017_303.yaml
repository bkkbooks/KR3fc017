body:
  text: 六千六百二十四為正隅平方開之合問今有句弦較乘股弦和加句股和開方得數多股一步只云股弦較乘弦較和減弦開方得數少黃方羃三步問弦和較何答曰二步術曰立天元一為句地元一為股人元一為弦和較三才相配求之得三千五百六十為正實七百六十為從方七千六百九十八為益上亷一千一百三十四為益二亷六千五百二十二為從三亷七百二十為從四亷二千八百二十九為益五亷二百三十三為益六亷六百七十為從七亷三十六為從八亷八十二為益九亷二為益十亷四為正隅十一乘方開之合問四象朝元六問今有五平三長立方開之少股一步只云三和四較平方開之多句二步問弦較較帶黃方二事連環得幾何答曰六步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得三萬九千三
  hash: sha256:2848322257a6e973a1b4ca3e904c8fdee52c649891d6bf86eb9e01dc83447127
