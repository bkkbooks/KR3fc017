body:
  text: 八十爲益實二爲從方三爲従廉一爲正隅立方開之合問今有茭草一千八百二十朿欲令撒星形埵之問底子幾何答曰一十三朿術曰立天元一爲撒星底子如積求之得四萬三千六百八十爲益實六爲從方一十一爲従上廉六爲従下廉一爲正隅三乘方開之合問今有茭草三千三百六十七朿欲令嵐峯形埵之問厎子幾何答曰一十二朿術曰立天元一爲嵐峯底子如積求之得八萬八百八爲益實二爲従方九爲従上廉十爲従下廉三爲從隅三乘方開之合問今有茭草八千五百六十八朿欲令撒星更落一形埵之問底子幾何答曰一十四朿術曰立天元一爲撒星更落一底子如積求之得一百二萬八千一百六十爲積實二十四爲從方五十爲従上廉三十五爲從二廉一十爲
