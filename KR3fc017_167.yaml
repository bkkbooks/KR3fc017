body:
  text: 八十為益實二為從方三為從廉一為正隅立方開之合問今有茭草一千八百二十朿欲令撒星形埵之問底子幾何答曰一十三朿術曰立天元一為撒星底子如積求之得四萬三千六百八十為益實六為從方一十一為從上廉六為從下廉一為正隅三乘方開之合問今有茭草三千三百六十七朿欲令嵐峯形埵之問砥子幾何答曰一十二朿術曰立天元一為嵐峯底子如積求之得八萬八百八為益實二為從方九為從上廉十為從下廉三為從隅三乘方開之合問今有茭草八千五百六十八朿欲令撒星更落一形埵之問底子幾何答曰一十四朿術曰立天元一為撒星更落一底子如積求之得一百二萬八千一百六十為積實二十四為從方五十為從上廉三十五為從二廉一十為
