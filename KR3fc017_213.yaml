body:
  text: 術曰立天元一為上靣箇數如積求之得六千九百四十一為益實九十五為益方六為從隅立方開之合問今有芻童垛果子積八十二箇只云併下長上闊平方開之加入下闊共得八箇下闊不及下長二箇上闊如上長二分之一髙與長上同問上下長闊及髙各幾何答曰下闊五箇下長七箇髙四層上闊二箇上長四箇術曰立天元一為下闊如積求之得九十五萬三千一百九十為正實七十七萬二千三百六十八為益方二十五萬四千八百六十一為從上廉四萬三千七百三十八為益二廉四千一百一十二為從三廉二百一為益四廣四為正隅五乘方開之合問今有芻甍垛果子積一百箇只云併下長下闊及髙為共減二餘以平方開之與上長等下長多於上長中半上長不及下
  hash: sha256:efe2b7e1090e8462cdfa7f80a64aef9df6f7d30fcfd2b76534d22d1a53519b46
