body:
  text: 為從上亷二為從二亷八為從下亷二為益隅四乘方開之得長合問今有直積三乘方開之得數以平除之不及平三步只云長以平方開之多於平二分之一問長平各幾何答曰平四步長六十四步術曰立天元一為平地元一為長天地配合求之得四為正實八十一為益方一百八為從上亷五十四為益二亷一十二為從下亷一為益隅四乘方開之得平合問今有直積三乘方開之以平而一所得少平三步只云長以平方開之不及長八分之七問長平各幾何答曰平四步長六十四步術曰立天元一為平地元一為長天地配合求之得六十四為益實八十一為從二亷一百八為益三亷五十四為從四亷一十二為益下亷一為正隅六乘方開之得平合問今有直積減小平加小較以大平乘之如大長而一得數減小平餘有九步只云平羃
  hash: sha256:dd8be5f7306d98c6b825f9d01a15c0b26d8ef955cf2064b3c753e773b9b60a57
