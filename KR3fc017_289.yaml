body:
  text: 為從上亷二為従二亷八為従下亷二為益隅四乗方𨳩之得長合問今有直積三乗方開之得数以平除之不及平三步只云長以平方𨳩之多於平二分之一問長平各幾何答曰平四步長六十四步術曰立天元一為平地元一為長天地配合求之得四為正實八十一為益方一百八為従上亷五十四為益二亷一十二為從下亷一為益隅四乗方開之得平合問今有直積三乗方𨳩之以平而一所得少平三步只云長以平方𨳩之不及長八分之七問長平各幾何答曰平四步長六十四步術曰立天元一為平地元一為長天地配合求之得六十四為益實八十一為従二亷一百八為益三亷五十四為従四亷一十二為益下亷一為正隅六乗方開之得平合問今有直積减小平加小較以大平乗之如大長而一得数减小平餘有九步只云平羃
  hash: sha256:6c1f23f2acfcce501f097f602a0fbc9445eeefd9cd4ec22db63fd391ebcb62a9
