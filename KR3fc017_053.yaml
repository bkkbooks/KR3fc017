body:
  text: 術曰立天元一為股如積求之得九萬七千四百四十為正實八千三百為從方四百六十七為益上廉二十六為益下廉一為正隅三乘方開之得股合問今有梯田積如小闊減大闊餘以小闊乘之得四千一百五十二步只云大闊不及正長九步𨚫多少闊四步問二闊及長各幾何答曰大闊一十六步小闊十二步正長二十五步術曰立天元一為大闊如積求之得四千六十四為益實五十為益方三為從廉一為正隅立方開之得大闊合問今有圭田積減四長餘五十六步只云較自乘減闊幂餘與長等問長闊各幾何答曰闊一十二步長二十五步術曰立天元一為圭長如積求之得二百為益實一十七為益方一為正隅平方開之得長合問
  hash: sha256:7554bdc0fd51e6a88b741139609a432bf4dbcf449991cb6892c06f3151022de0
