body:
  text: 百九十八爲益方一爲従隅平方開之合問或問務前聽得語云云新熟醇醨共一盆醇酒一升醉三客醨酒三升醉一人都來共飲十二斗座中醉倒五十人借問四方能算者幾多醨酒幾多醇答曰醇酒三升七合半醉一十一人四分人之一醨酒一碩一斗六升二合半醉三十八人四分人之三術曰立天元一爲醇酒數如積求之得三十為益實八為従方上寔下法而一得醇酒数又立天元一為醨酒数如積求之得九百三十為正寔八為益方開無隅平方而一得醨酒又立天元一為飲醇酒人数如積求之得九十為正實以為益方之寔下法而一得醇酒人又立天元一為飲醨酒人数如積求之得三百一十為益寔八為従方開隅平方而一得醨酒人数小盡者約之合問或問今有直田一畝足正向中閒生竿竹四角至竹各十三借問回事元数目答曰長二十四步阔一十步術曰立天无一為長如積求之得五萬七千六
