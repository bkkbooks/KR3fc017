body:
  text: 百九十八為益方一為從隅平方開之合問或問務前聽得語云云新熟醇醨共一盆醇酒一升醉三客醨酒三升醉一人都來共飲十二斗座中醉倒五十人借問四方能算者幾多醨酒幾多醇答曰醇酒三升七合半醉一十一人四分人之一醨酒一碩一斗六升二合半醉三十八人四分人之三術曰立天元一為醇酒數如積求之得三十為益實八為從方上實下法而一得醇酒數又立天元一為醨酒數如積求之得九百三十為正實八為益方開無隅平方而一得醨酒又立天元一為飲醇酒人數如積求之得九十為正實以為益方之實下法而一得醇酒人又立天元一為飲醨酒人數如積求之得三百一十為益實八為從方開隅平方而一得醨酒人數小盡者約之合問或問今有直田一畝足正向中間生竿竹四角至竹各十三借問回事元數目答曰長二十四步闊一十步術曰立天無一為長如積求之得五萬七千六
