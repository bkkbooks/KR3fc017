body:
  text: 求之得三千六百為正實一百六十九為益方一為正隅平方𨳩之合問今有句股積三十步只云句股和一十七步問股羃幾何答曰一百四十四步術曰立天元一為股羃地元一為句天地配合求之得三千六百為益實一百六十九為従方一為益隅平方開之合問今有句股積三十步只云句股和一十七步問弦羃幾何答曰一百六十九步術曰立天元一為弦羃地元一為股天地配合求之得二千八百七十三為正實一十七為益方開無隅平方合問左右逄元二十一問今有弦和較乗句得六步只云弦較較除股羃得四步問句股幾何答曰句三步術曰立天元一為股地元一為較天地配合求之得三千七十二為正實七百八十四為益上
  hash: sha256:122e9003779c38a5a4ecc10ff1682cc412c92554f3290b96a76ee90b0b2624a6
