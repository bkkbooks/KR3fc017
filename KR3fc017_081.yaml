body:
  text: 六為從二亷九十六為益下亷四為從隅四乘方開之得倉闊又立天元一為囤周如積求之得二千三百萬一百一十二為益實三百八十六萬三千三百四十為從方二十六萬三百五十二為益上亷八千七百七十六為從二亷一百四十八為益下亷為正隅四乘方開之得囤周又立天元一為囤髙如積求之得二百三十萬二千九百九十二為正實六十萬八百七十六為益方六萬三千三百六十為從上亷三千四百為益二亷九十二為從下亷一為益隅四乘方開之得囤髙又立天元一為粟髙如積求之得四萬四千九百一十二為益實三千四百二十為從方二百八十八為從上亷一十六為從二亷二為從方一為正隅四乗方開之得粟髙合問商功修築七問今有積築圓城一座計積四百八十八萬五千三百四十四尺只云下內外周差一百八尺上內外周差四丈二尺上下外周差六十尺上下內周差六尺下廣少如髙
  hash: sha256:e4dc20546990629a336bf2d4c2ecc34d1aedd72806ee83c21906df52d5a5493f
