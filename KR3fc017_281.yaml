body:
  text: 答曰平三步長四步術曰立天元一為平地元一為長天地配合求之得六十三為正實一十八為益方一十六為益上亷二為從下亷一為正隅三乘方開之得平合問今有直積加一長二平共得二十二步只云長羃加平減較羃餘一十八步問長平各幾何答曰平三步長四步術曰立天元一為平地元一為長天地配合求之得一十八為正實二十七為益方四為從亷一為從隅立方開之得平合問今有直積加二平減三較餘一十五步只云長取強半平取少半與和七分之四等問長平各幾何答曰平三步長四步術曰立天元一為平地元一為長天地配合求之得四十五為盜實三為從方四為從隅平方開之得平合問今有直積以長乘之用平除之所得減積如長而
  hash: sha256:56741344b94f8c6ee5c3fe11426c51003bfddb5ba33a31b8981bebf527281b4c
