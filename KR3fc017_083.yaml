body:
  text: 六尺𨚫多上廣一丈一尺髙不及上內周一萬六千二百二十四尺令侵城撅壕取𡈽築城定壕廣三丈問內外周髙及上下廣併濠深各得幾何答曰下外周九里三十步內周九里八步二尺廣一丈八尺上外周九里一十八步內周九里九步三尺廣七尺髙二丈四尺深一丈三尺二寸一萬二百七十五分三寸之七十四術曰立天元一如城髙如積求之得四百八十八萬五千三百四十四為益實一十八萬六千九百四十八為益方一萬六千二百四十七為從亷一為正隅立方開之得髙二丈四尺餘依加减求之求濠深術曰四因城積三除為實又城下外周併入六箇濠廣及城外周折半以濠廣乘之為法實如法而一即濠深合問今有築方城一座計積四千五百四十一萬七千六百尺只云下面外方减十步餘開方除之併入下廣共得六十五步又開方數少如上靣外方三千五百四十六步上靣內外方差四步上面外方多如下靣內方六步上下廣差三步上
  hash: sha256:7e8f839f19457a7e1bc40a3b7b85ad95882a5ca996b592f5a82b6ee8136201f2
