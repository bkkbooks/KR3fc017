body:
  text: 答曰平三步長四步術曰立天元一為平地元一為長天地配合求之得三為正實一十一為從方八為從上亷七為益下亷一為正隅三乘方開之得平合問今有直積加一平减三長餘有三步只云平羃與較等問積幾何答曰三十六步術曰立天元一為直積地元一為平天地配合求之得三十六為益實三十七為從方三十七為益亷一為正隅立方開之得積合問今有直積加小和小較减大和大較餘五十二步只云大長加小和小較平方開之不及大平二步問長平各幾何答曰平六步長一十二步術曰立天元一為平地元一為長天地配合求之得九十六為正實六十八為從方一十四為益上亷六為從下亷一為益隅三乘方開之得平合問今有直田長自乘减和餘九步只云平自乘减較餘八步問長平各幾何
  hash: sha256:90752cbc37471836259b757c05173c8ca38a41822dc29ce28cf1a9858e6e0d06
