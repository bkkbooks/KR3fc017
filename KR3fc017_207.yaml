body:
  text: 寓燕松庭朱世傑漢𡖖編述臨川琴屋鍾燁叔明較正果垛疊藏二十問今有三角垛果子一所直錢一貫三百二十文只云從上一箇直鍋二文次下層層每箇纍貴一文問底子每靣幾何答曰九箇術曰立天元一為每靣底子如積求之得三萬一千六百八十為益實十為從方二十一為從上廉一十四為從下廉三為從隅三乘方開之得每靣底子合問今有四角垛果子一所直錢一貫三百六十五文只云底子每箇直錢一文次上層層每箇纍貴二文問底子每靣幾何答曰九箇術曰立天元一為每靣底子如積求之得八千一百九十為益實一為從方二為從上廉二為從二廉一為正隅三乘方開之合問今有四角落一形果子積五百四十箇問底子幾何
  hash: sha256:8e34d33aa268c638bf40646901d0e7cf16b701753282086f132e78eb5046d93c
