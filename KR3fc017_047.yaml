body:
  text: 步只云平幂與較等問長平各幾何答曰平五步長三十步術曰立天元一為平如積求之得一十五萬五千八百五為益實九為益方七十四為從上廉一百六十二為從二廉九十九為從三廉一十八為從下廉一為正隅五乘方開之得平合問今有積加三平減一較餘自乘减三平加一較得七萬八千四百一十四步只云平自乘與和等問長平各幾何答曰平七步長四十二步術曰立天元一為平如積求之得七萬八千四百一十四為益實五為益方二十六為從上廉二十為益二廉一十四為從三廉四為益下廉一為正隅五乘方開之得平合問今有積加平以長中半乘之得三千九百步只云長以平方開之所得不及平七步問長平各幾何答曰平一十二步長二十五步術曰立天元一為平如積求之得七千八百為
