body:
  text: 今有圭田梯田各一段共八畝一十五分畝之八只云梯取大闊六分之五小闊取三分之二為共减長八分之三餘二十二步又大闊取三分之一長取四分之三為共减小闊六分之五餘四十步又小闊取三分之一長取八分之五為共减大闊四分之三餘二十一步又倍圭長與圭闊羃等問圭田長闊各幾何答曰圭田長三十二步闊八步術曰先以合分法求之後如方程正負術入之左行得長中行得小闊右行求大闊又梯積减共積餘為圭積立天元一為圭長如積求之得三萬三千七百六十八為益實一為正隅立方開之得圭長三十二步又立天元一為圭闊如積求之得五百一十二為益實一為從方立方開之得圭闊合問今有甲乙丙買絲各不知數甲云得乙絲三分之二丙絲三分之一滿二斤半乙云得甲絲三分之二丙絲二分之一
  hash: sha256:41ae4f7fce793c4ebe651c46e16c13f86b8b8bef0c3a5caf9cb9f5725ed1562e
