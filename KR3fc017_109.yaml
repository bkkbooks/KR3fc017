body:
  text: 玉圎周七寸積六寸三百五十二分寸之二百八十九重二斤一十五兩一十七銖四十四分銖之四十一術曰立天元一為金圎周如積求之得五百三十六萬八千一百一十三為益實四萬九千四百六十四為從方二萬九千六百八十二為益亷一萬五十一為從隅立方開之得金圓周又立天元一為銀圎周如積求之得五百三十三萬八千二百八十為益實二萬二百五十三為從方四百七十一為從亷一萬五十一為從隅立方開之得銀圎周又立天元一為玉圎周如積求之得五百三十萬七千五百五為益實五萬一千三百四十八為從方三萬六百二十四為從亷一萬五十一為從隅立方開之得玉圎周合問今有三角垛四角垛果子方箭圎箭平圎徑立圎徑平方靣立方靣茭草垛各一所共積一萬五百八十九算只云立方靣不及三角底靣一箇如平方靣五分之二茭草底子多三角底靣一朿却與立圎徑等圎箭外周如四角底面
  hash: sha256:179243468c4d52e1789a5a5c6ce56869726a4981fa40f0a93fc42ac20b671b2e
