body:
  text: 答曰平八步三分步之二長一十二步四分步之三術曰立天元一為長如積求之得四千一百三十一為益實一十八為従方二十四為従隅平方開之得長不盡按之分法求之合問今有直積加長以平乘之得一千六十八步六分步之一只云二和一長內减三平五較餘九步六分步之一問長平各幾何答曰平八步三分步之二長一十二步四分步之三術曰立天元一為平如積求之得一萬二千八百一十八為益實五十五為益方三十一為益亷二十四為従隅立方開之得平不盡按之分法求之合問今有直積自乘减和羃餘一萬一千七百五十一步一百四十四分步之八十三只云較不及平四步一十二分步之七問長平各幾何答曰平八步三分步之二長一十二步四分步之三術曰立天元一為平如積求之得一百六十九萬五千二百五十二為益實三千九百六十為従方一千七百二十九従上亷二千六百四十
