body:
  text: 一得七步只云較羃加長與平羃同問長平各幾何答曰平八步長一十五步術曰立天元一為長地元一為平天地配合求之得一十五為益實一為從方上實下法而一得長合問今有直田平羃減一和六較餘與長等只云較羃加一平減四較亦與長等問長平各幾何答曰平八步長一十三步術曰立天元一為平地元一為長天地配合求之得一百二十為益實三十一為從方六為從亷一為益隅立方開之得平合問今有直積加和羃減較羃以平除之與積等只云長羃加二較減二差羃亦與積等問長平各幾何答曰平五步長一十二步術曰立天元一為長地元一為平天地配合求之得六十為益實一十七為從方一為益隅平方開之得長合問
