body:
  text: 今有股弦較除弦和和與直積等只云句弦較除弦較和與句同問弦幾何答曰五步草曰立天元一為句地元一為股人元一為弦三才相配求求得求得三之得今式云式元之式以云式剔而消之二後互隱通式皆人易天位前得得分相消左右內二得得行得外二行得內外相消四約之开方式三乘方开之得弦五步四象會元今有句乘五較與弦羃加句乘弦等只云句除五和與股羃減句弦較同問黃方帶句股弦各幾何答曰一十四步草曰立天元一為句地元一為股人元一為弦物元一為開數四象求得三和會求之求得今式元之式
