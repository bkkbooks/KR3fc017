body:
  text: 二萬一千八百一十五步只云博徑三步問池方田周各幾何答曰池方一十八步田周九十步術曰立天元一為池方如積求之得四十八萬回千七百七十六為益實一千八百四為從方四百二十四為從上廉三十六為從下廉一為正隅三乘方開之得池方合問今有環田積實徑乘外周加之𨚫減內周幂餘七百二十九步只云併內外周減二餘以平方開之所得不及實徑一步問周徑各幾何答曰實徑十五步內周五十四步外周一百四十四步術曰立天元一為實徑如積求之得二千九百二十五為益實六十為從方六十六為益上廉二十為從下廉一為益隅三乘方開之得實徑一十五步合問端匹五隱九問今有錢三貫四百一十九文買羅一端只云端長內加八尺之價共得五百七十八文尺
