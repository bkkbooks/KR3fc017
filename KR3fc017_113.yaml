body:
  text: 隅立方開之即得方箭外周又立天元一為圎箭外周如積求之得二千二百二十萬六千五百二十八為正實三百四十七萬五千五百三十六為益方一十五萬七千一百二十四為従亷一千八百九為益隅立方𨳩之得圎箭外周又立天元一為平圎徑如積求之得九億五千二百一十萬四千八百八十八為正實四千二百五十七萬五千三百一十六為益方五十四萬九十九百三十四為従亷一千八百九為益隅立方開之得平圎徑又立天元一為立圎徑如積求之得三百四十七萬三千五百三十六為正實六十四萬四千三百六十為益方一萬七千五十六為従亷六百三為従隅立方𨳩之得立圓徑又立天元一為平方面如積求之得七百五萬五千八百二十五為正實三十七為従亷一百二十步為分為従隅立方開之得平方面又立天元一為立方面如積求之得二百二十五萬七千八百六十四為正實五十六萬八千九百為益方二萬六百七十四為従亷六百三為従隅立方開之得立方面
  hash: sha256:87e3090dfaef53b6e5ca70aa77bd8145adfc34e5dda98aaef1afcd2656a476a4
