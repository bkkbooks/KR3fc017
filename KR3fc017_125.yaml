body:
  text: 六乗方開之得二步為開方數合問三率究圎一十四問今有平圎積四十九步三百一十四分步之二百三十九問為徽圎周幾何答曰二十五步術曰立天元一為徽圎周如積求之得一萬五千六百二十五為益寔二十五為從隅平方開之合問今有平圎積四十九步三百一十四分步之二百三十九問為徽圎徑幾何答曰七步一百五十七分步之一百五十一步術曰立天元一為徽圎徑如積求之得一百五十六萬二千五百為益寔二萬四千六百四十九為從隅平方開之不盡以連枝同體術求之今有平圎積四十五步一十一分步之九問為宻圎周幾何答曰二十四步術曰立天元一為宻圎周如積求之得五百七十六為益寔一為正隅平方開之合問今有平圎積四十五步一十一分步之九問為宻
