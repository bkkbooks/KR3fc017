body:
  text: 為益上廉三百六十為益下廉五為正隅三乘方開之得甲截矢九步列甲積通分納子內減矢羃餘以矢除之即甲截弦又立天元一為共截矢如積求之得二百六十二萬四千四百為益實三千二百四十為從上廉三百六十為從二廉五為益隅三乘方開之得共截矢一十八步內減甲截矢餘即乙截矢又共矢自之以減甲乙併積通分內子之數除以共矢而一即乙截弦合問今有圎田一段甲東截一弧計積三十一步中半步乙西截一弧計積九十步只云甲截矢少如乙截矢三步問二弧各截弦矢幾何答曰甲截矢三步截弦一十八步乙截矢六步截弦二十四步術曰立天元一為甲截矢如積求之得三萬五千七百二十一為正實三萬五千七百二十一為從方一萬七百七十三為從上廉九千六百六百六為益二廉二百七為從三廉三十三為從下廉五為益隅五乘方開之得甲截矢又
