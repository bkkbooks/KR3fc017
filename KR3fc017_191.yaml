body:
  text: 爲益上廉三百六十爲益下廉五爲正隅三乗方開之得甲截矢九步列甲積通分納子內減矢羃餘以矢除之即甲截弦又立天元一爲共截矢如積求之得二百六十二萬四千四百爲益實三千二百四十爲従上廉三百六十爲従二廉五爲益隅三乘方開之得共截矢一十八步內減甲截矢餘卽乙截矢又共矢自之以減甲乙併積通分內子之數除以共矢而一即乙截弦合問今有圎田一段甲東截一弧計積三十一步中半步乙西截一弧計積九十步只云甲截矢少如乙截矢三步問二弧各截弦矢幾何答曰甲截矢三步截弦一十八步乙截矢六步截弦二十四步術曰立天元一爲甲截矢如積求之得三萬五千七百二十一爲正實三萬五千七百二十一爲従方一萬七百七十三爲従上廉九千六百六百六爲益二廉二百七爲従三廉三十三爲従下廉五爲益隅五乘方開之得甲截矢又
