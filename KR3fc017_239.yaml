body:
  text: 術曰立天元一為容方靣如積求之得七十二為益實一十八為從方開無隅平方而一合問今有梯田一段小闊八步大闊三十二步長二十二步半欲於大闊容圎池一所問容池徑幾何答曰一十九步二分術曰立天元一為大闊容圎徑如積求之得一十三萬八千二百四十為益實四千六百八為從方一百三十五為從隅平方開之合問今有梯田一段大闊三十二步小闊八步長二十二步半欲于小頭容圎池一所問容池周幾何答曰四十步術曰立天元一為小頭容圎徑如積求之得九百六十為益實一百二十八為益方一十五為從隅平方開之不盡按之分法求之合問今有圎田二段內有匝邊容等徑圎池三所只云田周减六步餘為益實一十四為從方五為益亷一為正隅立方開
  hash: sha256:5b7a4f968035888675018fadaaa9bdf1a4f74a0ad2980d306226fc11b011041e
