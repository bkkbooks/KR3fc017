body:
  text: 盡者平地堆之只云倉長多扵倉深七尺不及囤周二丈倉深却多平地乗髙三尺倉闊如倉長二分之一圆囤周髙和得四十八尺其平地粟髙自乗加入粟髙與粟周等問三事各得幾何答曰倉長一丈六尺闊八尺深九尺囤周三丈六尺髙一丈二尺粟周四丈二尺髙六尺術曰立天元一為倉深如積求之得五萬二千八百九十三為益實二千三百一十三為従方一十八為益上亷八十二為従二亷一十三為益下亷一為正隅四乗方開之得倉深又立天元一為倉長如積求之得一十四萬六千一百一七二為益實四萬四千四百六十為從方八千九百九十二為益上亷九百三十六為從二亷四十八為益下亷一為正隅四乗方開之得倉長又立天元一為倉闊如積求之得一萬八千二百六十四為益實一萬一千一百一十五為從方四千四百九十六為益上亷九百三十
