body:
  text: 百為正寔六百七十六為益之亷一為正隅三乗方開之得長又立天元一為闊如積求之得五萬七千六百為益寔六百七十六為従之亷一為益隅三乗方開之得闊義立天元一為和如積求之得一千一百五十六為益寔一為正隅平方開之得和又立天元一為較如積求之得一百九十六為正實一為負隅平方聞之得較合问或問我有一壺酒攜著遊春走遇務添一倍逢店飲䇆九店務经四處没了壺中酒借問此壺中當元多少酒答曰一斗七升八合一勺二抄五撮術曰立天元一為當元壺中酒如積求之得二百八十五為益寔一十六為従方上寔下法而一合問或問九百九十九文錢及時梨果買一千一十一文梨九箇七枚果子四文錢答曰梨六百五十七箇價八百三文果三百四十三枚價一百九十六文術曰立天元一為梨數如積求之得二萬六千
  hash: sha256:5da9bbd07a03be74d31a6f63dfa7346e8869a500312d168dddeff6dcab886258
