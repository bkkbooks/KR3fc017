body:
  text: 平方開之得中股八步又立天元一爲較如積求之得四千一百七十六爲正實三千三百四十四爲益方六百三十五爲従上廉四十四爲益下廉一爲正隅三乘方開之得較合問今有四不等田一段東長二十六步西長二十五步南闊一十四步北闊一十七步與鄰對換直田一段只云併直田長較爲實五爲從方一爲從隅平方開之所得不及平七步問長平各幾何答曰長三十一步平一十二步術曰立天元一爲四不等之元方靣如積求之得四百八十爲正實二十八爲従方二爲益隅平方開之得二十四步又立天元一爲平如積求之得七百四十四爲益實一十四爲從隅方八爲益廉一爲正隅立方開之合問今有圭田一段不云圭闊只云長五十步直錢五十四兩今從尖截闊一十二步直銀六兩問截長闊各幾何答曰截長十六步太半步截闊三十六步
