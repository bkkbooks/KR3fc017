body:
  text: 術曰立天元一為截長如積求之得二千五百為正實九為益隅平方開之得截長不盡按之分術求之合問今有梯田一段小闊一十二步大闊二十步直錢三十二貫文今從大頭截長四步直錢九貫五百文問截闊及元長各幾何答曰截闊一十八步元長一十六步術曰立天元一為截闊如積求之得三百二十四為正實一為益隅平方開之得截闊合問今有梯田一段小闊二十五步大闊六十五步正長一百六十步今從小闊截撥七畝一百一十二步問截長闊各幾何答曰截長五十六步闊三十九步術曰立天元一為截長如積求之得一萬四千三百三十六為益實二百為從方一為從隅平方開之得截長合問今有梯田一段大闊四十二步小闊一十八步正長一百二十步今從大闊截地十畝一百八十七步二分步之一問
  hash: sha256:1928bb4bc28416d70bb333438a74b12b154b99ffb6d96e4b7a81cc6f9ab86e3d
