body:
  text: 術曰立天元一為方箭外周如積求之得四十九萬三千一百三十六為益實三萬一千三百四為益方一千七百四十七為正隅平方開之得方周合問今有方圎箭各一朿共積二百八隻只云圎箭外邊第二層周數與方箭外邊第一層周數同問方圎周各幾何答曰圎周三十六隻方周三十二隻術曰立天元一為圎箭外周如積求之得九千九百三十六為益實二十四為從方七為從隅平方開之得圎周合問撥换截田一十九問今有半種金田一段長五十步斜闊一十步與鄰對撥圭田一段只云併圭田長闊較為正實一十五為益方一為正隅平方開之少如較四步問圭田長闊各幾何答曰長二十五步闊一十六步術曰立天元一為半種金田之中股如積求之得二千四百為正實一百為從方五十為益隅
  hash: sha256:65e5760a4eecc77824198ffcbfd07b6ae35d418691691242536afca00147c1dc
