body:
  text: 凡句股之術出于圎方圎徑一而周三方徑一而匝四伸圎之為句展方之為股共結一角余弦適五句股之所生也今言五和者句股和句弦和股弦和弦和和弦較和併之得四十二步自乘得一千七百六十四步共為二十五段也
