body:
  text: 為正實一百一十二為益方四十一為益隅立方開之得四步合問今有一數不知多少但言五較各自乘並之為正實以三為益方一為從上亷一為從下亷二為益隅三乘方開之與其數相等只云句股和羃減二直積加三相和與其數羃自乘併弦羃減股相同又云半之三相和加黃方與其數再自乘亦等問元數幾何答曰二步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得一千一百五十二為正實七百六十八為益方六百四十為益上亷一千七百九十二為從二亷三百八十四為益三亷九千八為益四亷一萬九千一百一十二為從五亷八千七百九十九為益六亷八千七百九十五為益七亷一萬二千六百三十七為從八亷二千三十為從九亷一萬九千一百六十八為益十亷二萬二千二百九十二為從十一亷一萬一千一百一十二為益十二
