body:
  text: 求之得六十六萬五千二百八十為益實一百二十為從方二百七十四為從上廉二百二十五為從二廉八十五為從三廉一十五為從四廉一為正隅五乘方開之合問今有圎錐垛果子積九百三十二箇問髙幾層答曰一十五層術曰立天元一為層數如積求之得七千四百五十五為益實二為從方三為從廉二為從隅立方開之合問今有三角臺垛果子積五百四箇只云上下靣底子和得二十一箇問上下靣各幾何答云上靣七箇下靣一十四箇術曰立天元一為下靣底子如積求之得六千一百三十二為益實六百六十二為從方三十為益廉一為正隅立方開之合問今有四角臺垛果子積一千一百一十一箇只云上靣不及下靣五箇𨚫多層數五箇問上下靣及髙各幾何答曰上靣一十一箇下靣一十六箇髙六層
