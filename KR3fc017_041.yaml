body:
  text: 廉九為益隅立方開之得長合問今有積加長以半平乘之得一千九百五十步只云長五分之三減平三分之二餘七步問長平各幾何答曰平一十二步長二十五步術曰立天元一為長如積求之得一十三萬為益實三千三百二十五為從方六百為益廉二十七為從隅立方開之得長合問今有積加三較以長乘之減三平餘九千七百四十四步只云長取太半平取弱半為共不及一長四步問長平各幾何答曰平一十六步長二十四步術曰立天元一為長如積求之得二萬九千八十八為益實一百三十二為從方五十一為益廉四為正隅立方開之得長合問今有積幂減平餘一萬一千六百五十五步只云長四分之一平三分之一和二分之一共得一十六步二分步之一問長平各幾何答曰平九步長一十二步
