body:
  text: 開之得匹長又立天元一為尺價如積求之得二千九百七十五為益實五十為益方一為正隅平方開之得尺價合問今有錢一百六十二貫五百六十文買布不知匹數只云每匹牙錢五文今無牙錢準布二匹問共布及匹價各幾何答曰共布二百五十六匹匹價六百三十五文術曰立天元一為共布如積求之得六萬五千二十四為益實二為益方一為從隅平方開之得共布之數又立天元一為匹價如積求之得四十萬六千四百為益實五為從方一為從隅平方開之得匹價合問今有紗一匹先截一尺作牙錢餘賣得錢一貫一百七十六文只云長尺價皆以平方開之二數相併共得一十二問匹長尺價各幾何答曰匹長二丈五尺尺價四十九文術曰立天元一為匹長開方數如積求之得一千三百二十為益實二十四為從方一百四十三為從上亷二十四為益下亷一為正隅三
