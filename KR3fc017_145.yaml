body:
  text: 之得弦合問句股測望八問今有直邑不知大小各中開門只云南門外二百四十步有塔人出西門行一百八十步見塔復抹邑西南隅行一里二百四十步恰至塔所問邑長闊各幾何答曰長一里一百二十步闊一里術曰立天元一為邑半長如積求之得一十八億六千六百二十四萬為正實一千五百五十五萬二千為從方二十七萬為益上亷四百八十為從下亷一為正隅三乘方開之得二百四十步倍之即長又立天元一為邑半闊如積求之得一十八億六千六百二十四萬為正實二千七十三萬六千為從方二十七萬為益上亷三百六十為從下亷一為正隅三乘方開之得一百八十步倍之即闊合問今有圓城不知大小各中開門甲乙俱從城心而出甲出南門一十五步而立乙出東門四十步見甲問城圓幾何答曰一里
  hash: sha256:e6ac78b7050a2f6c55406008e73bbe05120c157726a337b41b101727ded0862b
