body:
  text: 之得弦合問句股測望八問今有直邑不知大小各中開門只云南門外二百四十步有塔人出西門行一百八十步見塔復抺邑西南隅行一里二百四十步恰至塔所問邑長闊各幾何答曰長一里一百二十步闊一里術曰立天元一爲邑半長如積求之得一十八億六千六百二十四萬為正實一千五百五十五萬二千為従方二十七萬爲益上亷四百八十爲從下亷一爲正隅三乗方開之得二百四十步倍之即長又立天元一為邑半闊如積求之得一十八億六千六百二十四萬爲正實二千七十三萬六千爲從方二十七萬爲益上亷三百六十爲從下亷一爲正隅三乗方開之得一百八十步倍之即闊合問今有圓城不知大小各中開門甲乙俱從城心而出甲出南門一十五步而立乙出東門四十步見甲問城圓幾何答曰一里
  hash: sha256:19a5f55e0e2847d972c1b9ea89cb9e64604bad1ffc5ba52609c1ffba1ffaa48a
