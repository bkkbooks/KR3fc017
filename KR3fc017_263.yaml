body:
  text: 丙九百四十文丁一百五十文戊二文術曰立天元一為一分之率如積求之得九百四十為益實一萬九千七百三十九為益方二十一為從隅平方𨳩之得九百四十文為一分之率合問今有木圎毬一隻徑一尺八寸欲令漆之先用布䪌布闊二尺問用布長幾何答曰三尺六寸二十分寸之九術曰立天元一為布長如積求之得七尺二寸九分為益實二尺為従方上實下法而一即長今有立方面五尺問東南上角直至西北下角長幾何答曰八尺六寸一百七十三分十之四術曰立天元一為針長如積求之得七十四為當作十五益實一為正隅平方開之不盡分合問今有圎材徑三尺只云鋸深三寸問鋸道長幾何答曰一尺八寸術曰立天元一為鋸道長如積求之得三百二十四為益實一為正隅平方𨳩之合問
