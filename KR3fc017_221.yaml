body:
  text: 底靣得二箇問二底靣各幾何答曰三底角靣四箇四角底靣八箇術曰立天元一為三角底子如積求之得一千九百五十六為益實五為從方二十一為從上廉二十五為從隅立方開之合問今有四角垛果子積以三角垛果子積除之得七箇只云三角底靣如四角底靣七分之四問二底靣各幾何答曰三角底靣四箇四角底靣七箇術曰立天元一為三角底子如積求之得三百九十二為正實三百七十八為從方一百一十九為益隅平方開之合問今有三角四角果子積相乘得二萬三千一百箇只云併三角四角底靣平方開之不及四角底靣三箇問二底靣各幾何答曰四角底靣七箇三角底靣九箇術曰立天元一為四角底靣如積求之得八十三萬一千六百為益實九百九十為從方八百七十七為從上廉二千五百三十為益二廉三百五十八為從三廉一千四百二十六為從四
