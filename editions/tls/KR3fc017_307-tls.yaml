body:
  text: 六十八為従二亷九十六為従三亷六百五十六為益四亷四十八為従隅五乗方開之合問今有五和併三事與四直積加二句等只云三事减五較與四相和常例五和五較四和者句股弦黄方减股羃同問句股弦和五事事連環得幾何答曰二十步術曰立天元一為句地元一為股人元一為弦物元一為𨳩數四象和會求之得七千六百八十為正實七萬五千五百八十四為益方一十一萬八千一百六十為従上亷五千七百八十為従二亷二千三百七十五為益三亷七十益四亷八為正隅五乗方開之合問今有句股弦各自乗减五和與倍之黄方羃適等只云五和加二句二股羃减八弦與半之五較羃少弦和較相同問立方𨳩十三事得幾何答曰四步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得三千七十二
  hash: sha256:047773f4b0835f4506610619dda2c9f885035d81d228595566912a559c6ca2cf
