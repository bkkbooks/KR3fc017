body:
  text: 二千七百六十八為益實二千五百四十四為益方一千八百八十八為従上亷六百一十六為益二亷七十二為従下亷一為正隅四乗方𨳩之得䑓髙合問今有圭田一段闊一十四步長二十四步於內欲容圎池一所問池徑幾何答曰一十步二分步之一術曰立天元一為容池圎徑如積求之得一千一百七十六為益實四十九為従方六為従益隅平方開之合問今有句股田一段句闊一十八步股長二十四步今欲従句內容圓池一所問容池周幾何答曰三十六步術曰立天元一為容池周如積求之得七千七百七十六為正實二百五十二為益方一為正隅平方開之合問今有句股田一段句闊六步股長一十二步今欲従句容方池一所問容方面幾何答曰四步
  hash: sha256:099dd3ad93fb270e290f2a4491e8272e64d852c9c5b305c6d76b9d1a56d80d91
