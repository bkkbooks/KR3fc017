body:
  text: 為正實一百一十二為益方四十一為益隅立方開之得四步合問今有一數不知多少但言五較各自乗並之為正實以三為益方一為従上亷一為従下亷二為益隅三乗方開之與其數相等只云句股和羃减二直積加三相和與其數羃自乗併弦羃减股相同又云半之三相和加黄方與其數𠕂自乗亦等問元數幾何答曰二步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得一千一百五十二為正實七百六十八為益方六百四十為益上亷一千七百九十二為従二亷三百八十四為益三亷九千八為益四亷一萬九千一百一十二為従五亷八千七百九十九為益六亷八千七百九十五為益七亷一萬二千六百三十七為従八亷二千三十為従九亷一萬九千一百六十八為益十亷二萬二千二百九十二為従十一亷一萬一千一百一十二為益十二
