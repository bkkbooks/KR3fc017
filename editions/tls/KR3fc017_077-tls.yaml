body:
  text: 尺又多圓徑三分之一却與囤髙等問倉囤髙深長廣各幾何按三分之一當作三分之二答曰倉廣一丈八尺長二丈二尺深一丈六尺囤徑一丈二尺髙一丈八尺周三丈六尺術曰立天元一為倉廣如積求之得一萬二千四百二十為益實一十二為益方三為従亷二為正隅立方開之得倉廣合問今有方倉四圆囤五受粟四千七百六十八斛只云倉長取中半自乘減七尺餘與囤髙等又囤徑取中半自乗加三尺却與倉深同倉方多扵囤徑二尺問倉囤髙深方径各幾何答曰倉方一丈深一丈九尺圆徑八尺髙一丈八尺術曰立天元一為倉半方面如積求之得一萬二千二十五為益實二百一十為従方二十六為益上亷六十二為益下亷三十一為従隅三乗方開之得半方倉面合問今有粟一千九十六斛八斗用倉囤各一貯之不
