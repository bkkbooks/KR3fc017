body:
  text: 答曰圎周三十六步方面一十二步術曰立天元一為圎田周如積求之得二萬六千三百五十二為正寔一千一百二十八為益方一十一為正隅平方開之得圎田周合問今有方圎田各一段圎従徽術方田羃內减圎田積餘以方田羃乗之得五千八百七十七步一百五十七分步之六十三只云方田面如圎田周三分之一問方田面圎田周各幾何答曰方面一十二步圎周三十六步術曰立天元一為方田面如積求之得二億八千九百七十四萬四千一百二十八為益寔一萬三千九百七十三為正隅三乗方開之合問今有方圎田各一段圎従宻率方田積內减方田面圎田積內减圎田周二餘數相乗得八千八百五十六步只云方面不及圎周二十田步問方面圎周各幾何答曰圎周三十六步方面一十二步術曰立天元一為圎田周如積求之得八百五十七萬二千六百八為益寔五十八萬八百為
