body:
  text: 数餘卽甲分層数合問今有四角垛果子一所令甲乙丙分之甲分五百九十箇乙分四百四十六箇丙分二百四箇従下給甲次中與乙次上與丙問各分層数幾何答曰甲三層乙四層丙八層術曰立天元一為共髙層数如積求之得七千四百四十為益實一為従方三為従廉二為従隅立方開之得共髙層数又立天元一為丙分層数如積求之得一千二百二十四為益實一為従方三為従廉二為従隅立方開之得丙分八層又立天元一為乙分層数如積求之得三千九百為益實一為従方三為従廉二為従隅立方開之得一十二層內減乙分層数餘為丙分層数以減共髙餘即甲分層数合問今有三角四角垛果子各一所共積一百一十一箇只云四角底靣不及三角底靣一箇問二底靣各幾何答曰三角底靣六箇四角底靣五箇術曰立天元一為三角底靣如積求之得二百
  hash: sha256:1b822a6214da7f6319467b3cefc23ca4cccd1fc752a49899d8eb3b6fc43c3c2d
