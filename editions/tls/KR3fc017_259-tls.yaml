body:
  text: 分六釐為正實一十寸為益方一寸為従隅平方問之得頂厚合問今有人買酒持錢一十二貫七百四十四文只云每甁納稅八十五文又共與用錢一百二十六文無錢納官準酒九甁問共酒及甁價各幾何答曰共酒三十六甁甁價三百五十四文術曰立天元一為甁價如積求之得一十二萬三百六十為益實一十四為益方一為正隅平方開之得甁價合問今有客持珎珠不知顆数直銀一千二百两只云每顆納稅銀四錢準納七顆貼與容銀八両二錢九分錢之二問元珠及顆價各幾何答曰元珠一百三十五顆顆價八两八錢九分錢之八術曰立天元一為元珠數如積求之得一十八萬九千為正實一百八十五為益方九為益隅平方開之即珎數又立天元一為顆價如積求之得四十三萬二千為益實七百四十為益
