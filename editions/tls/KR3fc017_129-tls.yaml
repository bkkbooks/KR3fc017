body:
  text: 今有立圎積九百二十八尺一百五十七分尺之一百四問爲徽立圎周幾何答曰三丈六尺術曰立天元一為徽立圎周如積求之得四萬六千六百五十六為益寔一為正隅立方開之得三千六尺合問今有立圎積九百二十七尺一十一分尺之九問為宻立圎徑幾何答曰一丈二尺術曰立天元一為宻立圎徑如積求之得三十二萬六千五百九十二為益寔一百八十九為従隅立方開之合問今有立圎積九百二十七尺一十一分尺之九問為宻立圎周幾何答曰三丈六尺術曰立天元一為宻立圎周如積求之得四萬六十六百五十六為益寔一為正隅立方開之得三丈六尺合問今有平羃二百六十五尺問為平方面幾何答曰一十六尺一十一分尺之三
  hash: sha256:60a72d5d369d34616e918f329aa408b62c1cbf2708ec86fc96b5f69e93b47e6c
