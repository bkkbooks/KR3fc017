body:
  text: 閫入下股二尺八寸八分又復立重矩於上其閒相去五尺更従句端斜望門額入上股三尺六寸又望門閫入上股二尺四寸問城門髙幾何答曰門髙一丈術曰立天元一爲門高如積求之得五十寸爲正實五分爲益方開無隅平方而一得門高合問或問歌彖一十二問或問今有方池一所每面丈四方停葭生西岸長其刑出水三十寸整東岸蒲生一種水上一尺無零葭蒲稍接水齊平借問三般怎定答曰水深一丈二尺蒲長一丈三尺葭長一丈五尺術曰立天元一爲水深如積求之得二千一百六十爲正實一百九十二爲益方一爲正隅平方開之合問又立天元一爲蒲長如積求之得二千三百五十三爲正實一百九十四爲益方一爲正隅平方開之合問又立天元一爲葭長如積求之得二千七百四十五爲正實一
