body:
  text: 術曰立天元一爲方箭外周如積求之得四十九萬三千一百三十六爲益實三萬一千三百四爲益方一千七百四十七爲正隅平方開之得方周合問今有方圎箭各一朿共積二百八隻只云圎箭外邊第二層周數與方箭外邊第一層周數同問方圎周各幾何答曰圎周三十六隻方周三十二隻術曰立天元一爲圎箭外周如積求之得九千九百三十六爲益實二十四爲従方七爲従隅平方開之得圎周合問撥换截田一十九問今有半種金田一段長五十步斜闊一十步與鄰對撥圭田一段只云併圭田長闊較爲正實一十五爲益方一爲正隅平方開之少如較四步問圭田長闊各幾何答曰長二十五步闊一十六步術曰立天元一爲半種金田之中股如積求之得二千四百爲正實一百爲從方五十爲益隅
