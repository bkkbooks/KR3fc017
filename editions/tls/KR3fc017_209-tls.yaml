body:
  text: 答曰八箇術曰立天元一為四角落一底子如積求之得六千四百八十為益實二為従方五為従上廉四為従下廉一為正隅三椉方開之合問今有三角嵐峯形果子積六百三十箇問底子幾何答曰六箇術曰立天元一為三角嵐峯底子如積求之得七萬五千六百為益實六為従方三十五為従上廉五十為従二廉二十五為従三廉四為従隅四椉方開之合問今有四角嵐峯形果子積四百五十八箇問底子幾何答曰五箇術曰立天元一為四角嵐峯底子如積求之得二萬六千八百八十為益實一為従方一十二半為従上廉二十五為従二廉一十七半為従三廉四為正隅四椉方𨳩之合問今有三角撒星更落一形果子積九百二十四箇問底子幾何答曰七箇術曰立天元一為三角撒星更落一底子如積
