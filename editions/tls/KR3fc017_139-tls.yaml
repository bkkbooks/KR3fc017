body:
  text: 上亷一爲従隅三乗方開之合問今有直積一百二十步只云弦較較乗弦和較得六十步問黄方幾何答曰六步術曰立天元一爲黄方如積求之得三十六爲益實一爲従隅平方開之合問今有直積一百六十八步只云句弦較乗弦和較得一百八步問句弦較幾何答曰一十八步術曰立天元一爲句弦較如積求之得一萬四百九十七步六分爲益實二百九十一步六分爲益上亷一為正隅三乗方開之合問今有直積一百八步只云句弦較乗句股較得一十八步問句幾何答曰九步術曰立天元一爲句如積求之得三百七十七萬九千一百三十六爲益實六萬九千九百八十四爲従上亷二百七爲益三亷一爲益隅五乗方開之合問今有直積一百六十八步只云股弦較乗句股較
