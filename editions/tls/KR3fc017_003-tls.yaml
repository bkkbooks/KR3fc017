body:
  text: 數一而巳一者萬物之所従始故易一太極也一而二二而四四而八生生不窮者豈非自然而然之數邪河洛圗書洰其秘黄帝九章著之書其章有九而其數則二百四十有六始方田終句股包括三才旁通萬有凡言數者皆莫得而逃焉如厤之大衍書之厤象詩之萬億及秭記禮之三千三百周官之三百六十數之見扵經者盖不特黄帝九章為然也自後世明算之科不設而此學寖失其傳由是厤法之進退畸盈農田之方圎曲直以至斗升勺合毫釐絲忽往往皆不能盡其法者又豈非古學之無傳乎學者莫知所依據邪燕山松庭朱先生以數學名家周游湖海二十餘年矣四方之来學者日衆先生遂發明九章之妙以淑後學為書三卷分門二十有四立問二百八十有八名曰四元玉鑑其法以元氣居中立天元一扵下地元一扵左人元一扵右物元一扵上陰陽升降進退左右牙通變化錯綜無窮其扵盈絀𨼆互正負方程演偭開方之術精妙元絕其法能發先賢未盡之㫖會萬理而朝元統三才而立極椉除
  hash: sha256:b5226aef942289a0187ebe8b95d18b74b35dc770bd7067b821d3c5ce3df91851
