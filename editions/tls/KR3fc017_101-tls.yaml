body:
  text: 百二為益實七千七百四為従方三百八十四為益隅平方𨳩之得長不盡按之分法求之合問今有直積一百一十步二分步之一只云併一長二平三和四較共得一百一十步一十二分步之八問長平各幾何答曰平八步三分步之二長一十二步四分步之三術曰立天元一為平如積求得一萬六百八為益實一千三百二十八為従方一千二為益隅平方開之得平不盡按之分術求之合問今有直積加平四分之一共得一百一十二步三分步之二只云一和五平內减四長三較餘一步一十二分步之六問長平各幾何答曰平八步三分步之二長一十二步四分步之三術曰立天元一為平如積求之得二千二十八為益實二十七為従隅平方開之得平不盡按之分法求之合問今有直積加平减較餘一百一十五步一十二分步之一只云三長二平多於二和三較一十二分步之六問長平各幾何
