body:
  text: 術曰立天元一爲截長如積求之得二千五百爲正實九爲益隅平方開之得截長不盡按之分術求之合問今有梯田一段小闊一十二步大闊二十步直錢三十二貫文今従大頭截長四步直錢九貫五百文問截闊及元長各幾何答曰截闊一十八步元長一十六步術曰立天元一爲截闊如積求之得三百二十四爲正實一爲益隅平方開之得截闊合問今有梯田一段小闊二十五步大闊六十五步正長一百六十步今従小闊截撥七畝一百一十二步問截長闊各幾何答曰截長五十六步闊三十九步術曰立天元一爲截長如積求之得一萬四千三百三十六爲益實二百爲従方一爲従隅平方開之得截長合問今有梯田一段大闊四十二步小闊一十八步正長一百二十步今従大闊截地十畝一百八十七步二分步之一問
