body:
  text: 答曰平三步長四步術曰立天元一為平地元一為長天地配合求之得六十三為正實一十八為益方一十六為益上亷二為從下亷一為正隅三乗方開之得平合問今有直積加一長二平共得二十二步只云長羃加平减較羃餘一十八步問長平各幾何答曰平三步長四步術曰立天元一為平地元一為長天地配合求之得一十八為正實二十七為益方四為從亷一為從隅立方𨳩之得平合問今有直積加二平减三較餘一十五步只云長取強半平取少半與和七分之四等問長平各幾何答曰平三步長四步術曰立天元一為平地元一為長天地配合求之得四十五為盜實三為從方四為從隅平方開之得平合問今有直積以長乗之用平除之所得减積如長而
  hash: sha256:b88238c6fefc84d32469ed974f61523ee7e28785849941d44aac889f61c88885
