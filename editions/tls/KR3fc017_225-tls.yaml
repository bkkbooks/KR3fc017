body:
  text: 椉方開之得實徑合問今有方田一段內有環池占之餘積以環內圎徑椉之減外周羃餘二萬五千一百六十四步只云四角至池外楞各長一十一步半內外周差三十六步問三事各幾何答曰內圎二十八步田方四十五步池環徑六步術曰立天元一為環之內圎徑如積求之得一百二十九萬六千五百四十為益實一萬四千七百四十九為従方四百二十七為従廉二十五為従隅立方開之得內圎徑合問今有圎田一段內有圭池容邊占之只云圭長不及圎徑三步半𨚫多池闊十步半問池長闊及圎徑各幾何答曰池闊二十一步池長三十一步半圎徑三十五步術曰立天元一為池闊如積求之得一百四十七為正實一十四為従方一為益隅平方開之得池闊合問
