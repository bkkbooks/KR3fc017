body:
  text: 或問今有人來贖解本多利少難評共收四貫別無零説破源流即省本利各開方畢併之與日相停𠰥還相減甚分明四十文差餘剩答曰本錢三貫六百文月利四十一文三分文之二兩箇月二十日利錢四百文術曰立天元一爲本錢地元一爲利錢天地配合求之得一百四十四萬爲益實四千爲従方一爲益隅平方開之得本錢餘依加減求之合問或問元有直田一畝地橫行六步豎行四斜行十五至隅頭借問長平数目事答曰長一十六步闊一十五步術曰立天元一爲長地元一爲平天地配合求之得五萬七十六百爲正實二千八百八十爲益方一百七十三爲益上亷八爲一下廉一爲正隅三乘方開之得長又立天元一爲闊地元一爲長天地配合求之得五萬七十六百爲正實一千九百二十爲益方一百七十三爲益上廉一十二爲益下廉一爲正隅三乘方開之得闊合問
