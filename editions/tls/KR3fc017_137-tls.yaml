body:
  text: 之得九步合問今有直積一十二步只云句弦和八步問弦較和幾何答曰六步術曰立天元一爲弦較和如積求之得七十二爲正實七十二爲益方一十六爲從亷一爲益隅立方開之合問今有直積一十二步只云句弦和八步問弦和和幾何答曰一十二步術曰立天元一爲弦和和如積求之得一百九十二爲益實一百二十八爲益方二十四爲従亷一爲益隅立方開之合問今有直積一百二十步只云黄方乗句股較得四十二步問句及黄方各幾何答曰句八步黄方六步術曰立天元一爲句如積求之得二萬八百爲正實五百一十七爲益上亷三爲從隅三乗方開之得句又立天元一爲黄方如積求之得五萬五百四十四爲正實一千四百四十爲益
