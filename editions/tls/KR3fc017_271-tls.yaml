body:
  text: 答曰二十步術曰立天元一為弦較和地元一為較天地配合求之得一萬四千四百為益實二百四十為從上亷一為益隅三乗方開之合問今有句股積三十步只云句股和一十七步問句股較幾何答曰七步術曰立天元一為句股較地元一為句天地配合求之得四十九為益實一為正隅平方𨳩之得七步合問今有句股積三十步只云句股和一十七步問句答曰八步術曰立天元一為句弦較地元一為句天地配合求之得三千六百為益實三千七百六為従方七十一為益上亷三十四為益下亷一為益隅三乗方𨳩之合問今有句股積三十步只云句股和一十七步問股弦較幾何答曰一步
  hash: sha256:a9743f5a47451b752e4012ffa41c660a72a906b88eebf9df7eb4097cb519d0b9
