body:
  text: 廣不及髙五步一尺令侵城四角週逥撅圜池取𡈽築城及燒磚包城令池上廣三丈五尺下廣三丈計料內外城頭合用條磚二十四百萬箇其磚每箇長一尺闊五寸厚二寸半每人日常役二十四尺每人日燒磚及包訖城塼三十箇今差夫五萬人一齊興功問上下內外方廣及髙併興功畢日池深各幾何答曰下外方一十里一十步內方一十里廣二丈五尺上外方一十里六步內方一十里二步廣一丈髙三丈六尺池深二丈五尺五寸二千四百六十七分寸之四百八十三興功五十一日一千一百二十五分日之四百七十三術曰立天元一為下廣如積求之得四十一萬二千三百四十八為益實一萬一千一百四十八步六分為從方一萬四千八百九十八步二分為從上亷一百三十一步八分為益下亷一為正隅三乘方開之得下廣余依加减求之求池深
