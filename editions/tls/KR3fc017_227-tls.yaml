body:
  text: 今有方田一段靠東北角有圎池占之餘積一萬二百二十五步只云従田西南隅斜至池楞五十九步問田方池徑各幾何答曰池徑一百二十步四方一百四十五步術曰立天元一為池徑如積求之得五十五萬二千為益實四千七百二十為従方一為益隅平方開之合問今有圎田一段周一百二十步被水従中穿為直河分為弧田二段只云二弧弦各長三十二步問水靣闊幾何答二十四步術曰立天元一為水靣闊如積求之得五百七十六為益實一為従隅平方開之得水靣闊合問今有方田一段靠西北隅有結角方池占之餘積四千步只云従田東南隅斜至池楞六十八步八分問田池各方幾何答曰池方十五步田方六十五步術曰立天元一為池方如積求之得
  hash: sha256:f0084871f0a7bb2d12ccf1cbf41ae5af4b392eeb37fd5ee329ce782bada463a3
