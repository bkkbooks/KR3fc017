body:
  text: 従三廉一爲正隅四乘方開之合問今有茭草五萬三百八十八朿欲令嵐峯更落一形埵之問底子幾何答曰一十六朿術曰立天元一爲嵐峯更落一底子如積求之得六百四萬六千五百六十爲益實六爲従方三十五爲從上廉五十爲従二廉二十五爲從三廉四爲正隅四乘方開之合問今有茭草一垛直錢二十五貫五百七十八文只云最上一朿直錢九文次下層層每朿累貴三文問底子幾何答曰二十八朿術曰立天元一爲茭草底子如積求之得一十五萬三千四百六十八爲益實二十一爲従方二七七爲従廉六爲従隅立方開之合問今有茭草一垛直錢四十二貫八百四十六文只云最下每朿直錢文六次上層層每朿累貴五文問底子幾何答曰三十六朿術曰立天元一爲茭草底子如積求之得二十
