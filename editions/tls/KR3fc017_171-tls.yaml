body:
  text: 五萬七千七十六爲益實一十三爲従方一十八爲従廉五爲従隅立方開之合問箭箭積交參七問今有方圎箭各一朿共積九十七隻只云方箭外周不及圎箭外周四隻問方圎周各幾何答曰圎周二十四隻方周二十隻術曰立天元一爲圎箭外周如積求之得四千六百八爲益實二十四爲從方七爲従隅平方開之得圎周合問今有方圎箭各一朿共積六十二隻只云二周相和得三十四隻問方圎周各幾何答曰方周一十六隻圎周一十八隻術曰立天元一爲方箭外周如積求之得二千五百六十爲正實二百七十二爲益方七爲正隅平方開之得方周合問今有方圎箭各一朿圎箭多如方箭一十二隻只云方箭與圎箭外周等問方圎周各幾何答曰周各二十四隻
