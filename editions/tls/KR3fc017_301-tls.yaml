body:
  text: 以股除之加句股和以股乗之加股以句除之减二股一句股較與句等只云句乗股羃以股除之加直積减句羃以句除之與弦同問五較連環除弦乗之相和得幾何答曰六步術曰立天元一為句地元一為股人元一為𨳩數三才相配求之得三才為正實四十一為益方六為正隅平方𨳩之合問今有直積减句股和以句乗之加句股較减直積以股除之加句股和以股乗之加股以句除之减二股一句股較與句等只云句乗股羃以股除之加宜積减句羃以句除之與弦同問五和五較句股及弦十三事連環除股乗直積羃得幾何答曰九步術曰立天元一為句地元一為股人元一為開數三才相配求之得五千六百二十五為正實一百六十八萬二百四十一為益方一十八萬
