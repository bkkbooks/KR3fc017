body:
  text: 取弱半共得三十二斗又米取太半麥取中半豆取太半共得三十七斗其米斗價取三分之一麥斗價取八分之五豆斗價取二分之一共得八十七文又豆麥斗價和得一百一十攵麥斗價少如米斗價八攵問三色及斗價各幾何答曰米一碩六斗斗價七十二文麥一碩八斗斗價六十四文豆一碩四斗斗價四十六文術曰先以合分法求之次如方程正負術入之左行得米中行得麥右行得豆又三色斗價如前術求之得二貫八十八文即三色共價立天元一為米斗價如積求之得八百六十四為正實一十二為益方上實下法而一得米斗價七十二攵又立天元一為麥斗價如積求之得七百六十八為正實一十二為益方𨳩無隅平方而一得麥斗價六十四文又立天元一為豆斗價如積求之得五百五十二為益實一十二為従方上實下法而一得豆斗價合問
