body:
  text: 圎徑幾何答曰七步一十一分步之七術曰立天元一為宻圎徑如積求之得七千五十六為益寔一百二十一為従隅平方開之得七步不盡桉之分法求之合問今有立圎積九百七十二尺問為古立圎徑幾何答曰一丈二尺術曰立天元一為古立圎徑如積求之得一萬五千五百五十二為益實九為従隅立方開之得一丈二尺合問今有立圎積九百七十二尺問為古立圎周幾何答曰三丈六尺術曰立天元一為古立圎周如積求之得四萬六千六百五十六為益寔一為正隅立方開之得三丈六尺合問今有立圎積九百二十八尺一百五十七分尺之一百四問為徽立圎徑幾何答曰一丈二尺術曰立天元一為徽立圎徑如積求之得一千七百二十八為益寔一為正隅立方開之合問
  hash: sha256:fe75f7d749b355447a3dc48ac76fa7ee099d7803b75c8f90384ed971a65b1f09
