body:
  text: 方開之得茭草一十五朿加一即日數米求日者立天元一爲三角底子如積求之得八萬四百為益實五百九十爲従方二百一十三爲従廉七為従隅立方開之得三角底子一十五箇加一即日數合問今有官司依平方招兵初段方面四尺次日方靣轉多二尺每人日給銀一兩二錢已招兵四千九百五十六人支銀二萬六千四十兩問招來幾日答曰一十四日術曰立天元一為三角底子如積求之得七千三百五十六為益實七十三為従方二十一為従廉二為従隅立方開之得三角底子一十二箇加二即日數銀求日數日立天元一為三角落一底子如積求之得六萬四千八百九十六為益實二百三十六為従方九十五為従上廉一十六為従下廉一為従隅三乗方開之得三角落一底子一十二箇加二即日數合問今有官司依圎箭朿招兵初朿外周一十二隻次朿外周轉多六隻每人日給米四升
  hash: sha256:87b20cdd354d1b86fbc5a26d15f5cc18d7661b6c84a3e8e032fda4d363d36beb
