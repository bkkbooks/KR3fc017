body:
  text: 廉七十為益五廉一為益隅七椉方𨳩之得股今有弦和較椉弦和和加句弦較椉句弦和得四十步只云句幂與股弦和等問弦幾何答曰五步術曰立天元一為弦如積求之得一千五百二十五為正實一百四十為従方五十四為益上廉一十二為益下廉一為正隅三椉方𨳩之得弦合問今有積減弦和較餘一十步只云句股和七步問黄方幾何荅曰二步術曰立天元一為黄方如積求之得二百為益實一百為従方二為従廉一為益隅立方開之得黄方合問今有積加平幂減長幂以平冪椉之減和幂餘不及積幂八千四百六十步只云長平較三步問長平各幾何答曰平九步長一十二步術曰立天元一為長如積求之得八千五百三十二為正實一百二十三為益方五十九為従
