body:
  text: 十為益九亷八為従隅十乘方𨳩之得句三步合法前問三才變通一十一問今有直積减弦較和加股弦較羃與弦較較羃等只云句羃减三相和與弦較和同問弦幾何答曰一十七步術曰立天元一為句地元一為股人元一為弦三才相配求之得三十四為正實一十九為益方一為正隅平方開之得弦合問今有直積加黄方羃𨳩方除之與倍之句弦較等只云弦較較羃减句股和𨳩方除之與股少弦較同問三相和幾何答曰立天元一為句地元一為股人元術曰立天元一為句地元一為股人元一為三相和三才相配求之得八百六十四為益實四千一百四為益方四萬二千二百二十八為從上亷五萬三千九百九十八為益下亷四千二百九為従隅三乘方開之合問今有平乗積如長而一所得减一平三較餘與平
