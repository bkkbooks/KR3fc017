body:
  text: 答曰四步術曰立天元一爲弦較較如積求之得一百九十二爲益實一百二十八爲従方二十四爲益亷一爲正隅立方開之合問今有直積一十二步只云句弦和八步問句較較幾何答曰二步術曰立天元一爲句較較如積求之得八爲正實八爲従方八爲益亷一爲正隅立方開之合問今有直積一十二步只云句弦和八步問句股和幾何答曰七步術曰立天元一爲句股和如積求之得五百五十三爲正實一百爲益方四爲益亷一爲正隅立方開之合問今有直積一十二步只云句弦和八步問股弦和幾何答曰九步術曰立天元一爲股弦和如積求之得九爲正實一百爲益方二十爲從亷一爲益隅立方開
