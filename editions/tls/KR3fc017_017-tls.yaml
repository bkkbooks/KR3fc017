body:
  text: 今有股弦較除弦和和與直積等只云句弦較除弦較和與句同問弦幾何答曰五步草曰立天元一為句地元一為股人元一為弦三才相配求求得求得三之得今式云式元之式以云式剔而消之二後互𨼆通式皆人易天位前得得分相消左右内二得得行得外二行得内外相消四約之开方式三椉方开之得弦五步四象會元今有句椉五較與弦羃加句椉弦等只云句除五和與股羃減句弦較同問黄方帶句股弦各幾何荅曰一十四步草曰立天元一為句地元一為股人元一為弦物元一為開數四象求得三和會求之求得今式元之式
  hash: sha256:b93687b659ade89ee9a06453f9bd49a615bbbefcbd2e5874328942e351742d96
