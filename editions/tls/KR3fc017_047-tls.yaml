body:
  text: 步只云平幂與較等問長平各幾何答曰平五步長三十步術曰立天元一為平如積求之得一十五萬五千八百五為益實九為益方七十四為従上廉一百六十二為従二廉九十九為従三廉一十八為従下廉一為正隅五乗方開之得平合問今有積加三平減一較餘自乗减三平加一較得七萬八千四百一十四步只云平自乗與和等問長平各幾何荅曰平七步長四十二步術曰立天元一為平如積求之得七萬八千四百一十四為益實五為益方二十六為従上廉二十為益二廉一十四為従三廉四為益下廉一為正隅五椉方𨳩之得平合問今有積加平以長中半椉之得三千九百步只云長以平方開之所得不及平七步問長平各幾何荅曰平一十二步長二十五步術曰立天元一為平如積求之得七千八百為
  hash: sha256:8f93e55b59c18eb44fc62cbb126addcb3faf2d91cefc649b24b5be367df21138
