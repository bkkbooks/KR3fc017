body:
  text: 益方九萬三千六百三十二為従上亷四千七百四十一為益下亷七十七為従隅三乗方開之得圎周合問今有方圎田各一段圎従古法方田積內减圎田積餘以圎田徑乗之得四百三十二步只云方田周虛加一算平方開之不及圎田徑五步問方面圎周各幾何答曰圎周三十六步方面一十二步術曰立天元一為圎田徑如積求之得六千九百一十二為益寔五百七十六為従方四百八十為益上亷一百三十六為従二亷二十為益下亷一為正隅四乗方開之得圎田徑三之為圎周合問今有方圎田各一段圎従徽術方田積內减圎田周三分之二餘数於上圎田積內加方田面二分之一减上餘一十步一百五十七分步之一百二十八只云併方面圎周為益寔二為益方三為従亷一為従隅立方開之得数如方田面弱半問圎周方面各幾何
