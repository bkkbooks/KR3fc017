body:
  text: 寓燕松庭朱世傑漢卿編述臨咱琴屋鍾燁叔明校正如意混和二問今有金毬銀毬玉毬谷一隻共積三十二寸五萬五千二百六十四分寸之一萬一千三十一計重一秤一十斤一十一両一十九銖一萬三千八百一十六分銖之二千二百九十五只云金圓周多如銀圎周一寸銀圎周却多玉圎周一寸金圎周依古法銀圎周依徽術玉圎周従密率金方一寸重一十五两一十八銖銀方一寸重一十二兩六銖金銀方寸之重皆按張丘建術玉方一寸重七兩按黄帝九章法問三圓周及積寸重各幾何答曰金圎周九寸積一十五寸一十六分寸之三重一十四斤一十五兩四銖八分銖之七銀圎周八寸積一十寸一百五十七分寸之三十重七斤一十二兩二十銖一百五十七分銖之二十八
