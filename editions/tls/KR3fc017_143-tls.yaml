body:
  text: 六百爲正實一千六百三十六爲益上亷一爲正隅三乗方開之得黄方又立天元一爲句股和如積求之得一千八百四十爲正實八千爲益方開無隅平方除之合問今有直積一百八步只云句弦和乗股弦和得六百四十八步問黄方及弦各幾何答曰黄方六步弦一十五步術曰立天元一爲黄方如積求之得二萬三千三百二十八爲益實六百四十八爲從隅平方開之得黄方六步又立天元一爲弦如積求之得一千八十爲正實七十二爲益方上實下法而一得弦合問今有直積一百八步只云五和五較相乗得三千七百八十步問弦幾何答曰一十五步術曰立天元一爲弦如積求之得七干九百七十四億九千三百六十五萬六百二十五爲益實七十五億二千二百八十四萬二千六百為従上亷二千五十二萬四千九百九十五為益三亷一萬二千六百三十六爲従隅五乗方開
