body:
  text: 廉一千一十六為益五廉二百九十二為従六廉三十九為益下廉二為従隅八椉方開之合問今有三角四角果子各一所共積二百一十一箇只云三角底子一層之数與四角底子一層之数等問各幾何答曰三角底靣八箇四角底靣六箇術曰立天元一為三角底子如積求之得六百四十一萬一千二十四為正實三萬五千四百五十為益方四萬五千五百三十三為益上廉一萬一千二為益二廉九十九為従三廉三十為従下廉二為正隅五椉方開之合問鎻套吞容一十九問今有圎田一段內有圎池占之餘積六百一十二步只云實徑自椉不及內周四十八步𨚫與內外周差等問三事各幾何答曰實徑六步內周八十四步外周一百二十步術曰立天元一為實徑如積求之得二千四百四十八為益實三十二為従上廉一為従隅三
  hash: sha256:0fdd7c440680853b79a2360be42b1411d66b6befd8ef383cefa99d002091abf5
