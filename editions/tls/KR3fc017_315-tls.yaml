body:
  text: 四元之形象收則其緼照徹而明開則縱橫發揮而曲盡妙理矣漢卿名世傑松庭其自號也周𣴑四方復遊廣陵踵門而學者雲集大德巳亥編集算學啓蒙趙元鎮巳與之板而行矣元鎮者博雅之士也惠然又備巳財鳩工繡梓俾之兹行于世前成始而今成終也好事之德奚可量㢤二書相為表裏不其韙歟屬余詳觀之有素所未嘗接於耳目者不用而用以之通非數之數以之成由是而知有數皆従無數中来髙邁於前賢能盡以矣明算君子㩀余言試為細草然後知誠而不妄也於是乎書大德登科二月甲子滹納心齊祖頣李賢父序道灮癸未三月從王北堂獲見此書許借録先勒名卷末以誌欣幸邵陽魏原識甲甲十二月十八日徐星伯借鈔畢是夜雪重獲此書燈下對之一大快事嘉慶廿四年七月従順德黎見山鈔
  hash: sha256:febc07a9d0769f5fd7ab56743d9ec091bf41af902a7ddf450762f99a24764382
