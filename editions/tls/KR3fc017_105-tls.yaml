body:
  text: 為四十為益下亷五百七十六為従隅三乘方開之得平不盡按之分法求之𠕂得一百四萬二千八十四億五千二百八十一萬二千八百為益實二千三百三十七億三十六萬一百九十二為従方九千一百九十萬二千五百二十八為従上亷一萬五千七百九十二為従下亷一為正隅三乘方開之得三百八十四與分母約之合問新編四元玉鑑卷上
