body:
  text: 術曰立天元一為股如積求之得九萬七千四百四十為正實八千三百為従方四百六十七為益上廉二十六為益下廉一為正隅三椉方開之得股合問今有梯田積如小闊減大闊餘以小闊椉之得四千一百五十二步只云大闊不及正長九步𨚫多少闊四步問二闊及長各幾何荅曰大闊一十六步小闊十二步正長二十五步術曰立天元一為大闊如積求之得四千六十四為益實五十為益方三為従廉一為正隅立方𨳩之得大闊合問今有圭田積減四長餘五十六步只云較自椉減闊幂餘與長等問長闊各幾何荅曰闊一十二步長二十五步術曰立天元一為圭長如積求之得二百為益實一十七為益方一為正隅平方𨳩之得長合問
  hash: sha256:aadbd377f05842027ac6be07853570d85a2b57f0235083f0a6a5bb3feee81cb0
