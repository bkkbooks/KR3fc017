body:
  text: 寓燕松庭朱世傑漢𡖖編述臨川琴屋鍾燁叔明較正果垛疊藏二十問今有三角垛果子一所直錢一貫三百二十文只云従上一箇直鍋二文次下層層每箇累貴一文問底子每靣幾何答曰九箇術曰立天元一為每靣底子如積求之得三萬一千六百八十為益實十為従方二十一為従上廉一十四為従下廉三為従隅三椉方開之得每靣底子合問今有四角垛果子一所直錢一貫三百六十五文只云底子每箇直錢一文次上層層每箇累貴二文問底子每靣幾何答曰九箇術曰立天元一為每靣底子如積求之得八千一百九十為益實一為従方二為従上廉二為従二廉一為正隅三椉方開之合問今有四角落一形果子積五百四十箇問底子幾何
  hash: sha256:ad42633472485e568df4d37967b7fbdc4c06f0c1af01722f10028e6ec79e6d12
