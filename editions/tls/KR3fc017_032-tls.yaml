body:
  text: 四象會元今有句椉五較與弦幕加句椉弦等只云句除五和与股羃減句弦較同問黄方帶句股弦各幾何荅曰一十四步草曰立天元一為句地元一為股人地一為弦物元一為開數四象求得求得三和會求之求得今式云式元之式求得物四式和會消而剔之式元之式皆物易天位得前式後便為左行以便為右行式左行消前式內二行得三約得開方式平方開之得一十四步合前問細草曰立天元一為句地元一為股人元一為弦物元一太為開數先置句股較句弦較股弦較弦較較弦和較併之得乗股以弦除之得寄左弦羃加句椉弦亦以弦除之得與左
