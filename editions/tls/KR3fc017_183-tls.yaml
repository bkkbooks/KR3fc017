body:
  text: 半問截句股各幾何答曰截句十五步截股四十五步術曰立天元一爲截句如積求之得一百二十五爲益實一爲正隅平方開之得截句今有句股田一段股長八十六步句闊二十五步八分今従尖截賣地一百五十三步六分問截長闊各幾何答曰截長三十二步截闊九步六分術曰立天元一爲截長如積求之得一千二十四爲益實一爲正隅平方開之得截長合問今有句股田一段句闊五十七步股長九十五步今從句橫截地八畝三十七步半問截長闊各幾何答曰截長四十五步截闊三十步術曰立天元一爲截長如積求之得六千五百二十五爲正實一百九十爲益方一爲正隅平方開之得截長合問今有句股田一段句闊六十步股長一百五十步令甲乙丙三人分之甲截積二千九十步乙截積一千八百五十步
