body:
  text: 又立天元一為茭草底子如積求之得三百四十七萬三千五百三十六為正寔六十四萬四千三百六十為益方一萬七千五十六為従亷六百三為従隅立方開之合問方圓交錯九問今有方圓田各一段圓従古法二積相乘得一萬五千五百五十二步只云方田面除圎田周得三步問方靣圓周各幾何答曰方靣一十二步圎周三十六步術曰立天元一為方田靣如積求之得二萬七百三十六為益寔一為正隅開三乗方除之得方田靣一十二步又立天元一為圎田周如積求之得一百六十七萬九千六百一十六為益寔一為正隅三乗方開之得圓田周合問今有方圎田各一段圎従徽術共積二百四十七步一百五十七分步之二十九只云方靣自乗內加圓周共得一百八十步問圎圓周方靣各幾何答曰圎周三十六步方靣一十二步
