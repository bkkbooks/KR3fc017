body:
  text: 以股除之加句股和以股乘之加股以句除之減二股一句股較與句等只云句乘股羃以股除之加直積減句羃以句除之與弦同問五較連環除弦乘之相和得幾何答曰六步術曰立天元一為句地元一為股人元一為開數三才相配求之得三才為正實四十一為益方六為正隅平方開之合問今有直積減句股和以句乘之加句股較減直積以股除之加句股和以股乘之加股以句除之減二股一句股較與句等只云句乘股羃以股除之加宜積減句羃以句除之與弦同問五和五較句股及弦十三事連環除股乘直積羃得幾何答曰九步術曰立天元一為句地元一為股人元一為開數三才相配求之得五千六百二十五為正實一百六十八萬二百四十一為益方一十八萬
