body:
  text: 丙截積六百五步從南橫截一句股與乙從東豎截一句股與丙外剩直田一段與甲問三人各截長闊幾何答曰甲截長五十五步截闊三十八步乙截股九十五步截句三十八步丙截股五十五步截句二十二步術曰立天元一為乙截句如積求之得一千四百四十四為益實一為正隅平方開之得乙截句即甲截闊又立天元一為丙截股如積求之得六百五為益實二分為從隅平方開之得丙截股即甲截長合問今有梯田一段正長二百一十步小闊五十步大闊九十二步令甲乙丙丁分之甲截積六千三百五十二步二分步之一乙截積五千三十七步二分步之一丙截積二千一百六十二步二分步之一丁截積一千三百五十七步二分步之一從上先截給甲次與乙丙丁問各截長闊幾何
