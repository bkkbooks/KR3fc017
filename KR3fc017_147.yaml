body:
  text: 術曰立天元一爲城之半圓徑如積求之得三十六萬為正實六萬六千為従方二千四百爲従上亷一為益隅三乗方開之得半圓徑六千步倍而三之即城周也合問今有方城不知大小各中開門北門外九十步有郵亭一所人於城中出西門外行一百六十步却遥望參城隅見亭問城方幾何答曰二百四十步術曰立天元一爲城之半方面如積求之得一萬四千四百爲益實一爲正隅平方開之得一百二十步倍之合問今有圓城不知髙遠立兩表各髙一丈二尺表閒相去八十尺令前表與後表參相直於前表退行六十尺人目薄地遥望乳頭與前表末參合又後從表退行一百尺人目薄地遥望乳頭與後表末參合問城髙及前表去城各幾何答曰城髙三丈六尺表去城一百二十尺術曰立天元一爲城髙如積求之得一千四百
  hash: sha256:f0eb7f1cd03a4b3ce29c5f0474ef17daf40b91662587202ab9f4f559485f54cc
