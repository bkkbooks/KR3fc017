body:
  text: 術曰立天元一為平如積求之得九十四萬四千五十五為益實八十一為益方三萬九千二百四為従上廉三千九百六十為益下廉一百萬正隅三椉方開之得平合問今有積減較幂餘七十一步只云三相和四十步問長平和得幾何荅曰二十三步術曰立天元一為長平和如積求之得四千七十七為益實二百為従方一為益隅平方開之得和合問今有積加和以積椉之得二千一百二十步只云長多扵平三步問積幾何荅曰四十步術曰立天元一為直積如積求之得四百四十九萬四千四百為正實四千二百四十九為益上廉四為益下廉一為正隅三椉方𨳩之得積今有積加斜幂得三百三十三步只云併長平斜得三十六步問弦幾何荅曰一十五步術曰立天元一為弦如積求之得三百一十五
