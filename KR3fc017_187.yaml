body:
  text: 答曰甲截長一百五步截闊七十一步乙截長六十五步截闊八十四步丙截長二十五步截闊八十九步丁截長一十五步截闊九十二步術曰立天元一爲甲截長如積求之得六萬三千五百二十五爲益實五百爲従方一爲従隅平方開之得甲截長又立天元一爲乙截長如積求之得一萬七十五爲益實一百四十二爲従方二分爲従隅平方開之得乙截長又立天元一爲丙截長如積求之得四千三百二十五爲益實一百六十八爲従方二分爲従隅平方開之得丙截長又立天元一爲丁截長如積求之得二千七百一十五爲益實一百七十八爲従方二分爲従隅平方開之得丁截長今有弧田一段弦長七十步矢闊二十五步今従弧背復截弧矢積二十六步問截弦矢各幾何答曰截弦二十四步截矢二步術曰先求得圎徑七十四步立天元一爲截矢如積求之得二千七百四爲益實一百
