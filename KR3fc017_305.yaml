body:
  text: 百六十為正實七萬四千八十為従方五千五百二十為従上亷二百八十為益二亷二百六十四為益三亷三十為益四亷一為益隅立乗方開之合問今有弦較和如股羃八分之三只云弦較較羃如句弦和羃四分之一問二弦四句二股三事連環得幾何答曰三十步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得六萬為益實一千一百為従方三百為従亷九為益隅立方開之合問今有弦和較羃加句弦較羃比股羃少一段句弦和只云弦和和羃减句股和乗弦和和加句弦較比二弦羃多一段三相和問句股弦三事連環得幾何答曰一十二步術曰立天元一為句地元一為股人元一為弦物元一為開数四象和會求之得四十八為益實四百二十四為従方八百五十一為益上亷
  hash: sha256:0b248260eb4413a85e0a19d7f39f6129aaa0520e3cd6eb5c2167774ad11c4164
