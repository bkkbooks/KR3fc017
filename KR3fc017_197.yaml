body:
  text: 九十萬九千七百六十爲従二廉一百二十四億五千一百八十六萬八千六十四爲益三廉九億二千二百七十四萬三千三百六十爲益四廉四百九十五萬五千六百六十四爲益五廉八萬二千三百二十爲従下廉二千四百一爲従隅七乗方開之得截池矢六步倍之以減池矢餘自乗復減池徑羃餘爲實平方開之得截池弦又池矢自乗倍之以池徑除之得數爲池周弦差加池弦得輞內周以減內外周相和之數餘卽外周又池矢加實徑爲通矢自乗倍之以通徑除之所得爲輞外周弦差以減外周餘卽通弦內減池弦餘半之卽博徑合問如像招數五問今有官司差夫一千八百六十四人築堤只云初日差六十四人次日轉多七人每人日支米三升共支米四百三石九斗二升問築堤幾日答曰一十六日術曰立天元一爲茭草底子如積求之得一千八百爲益實六十七半爲従方三半爲従隅平
