body:
  text: 云數餘為池斜倍之即水長合問今有方五斜七八角田一段內復有方五斜七八角池占之餘積三千九百七十七步四十九分步之七只云靣徑至池楞各長一十七步問田池靣各闊幾何答曰田闊三十六步池闊二十二步術曰立天元一為池靣闊如積求之得三十六萬二千二百八為益實一萬六千四百六十四為從方開無隅平方而一得池闊加差一十四即外田靣闊合問今有圎田一段被水侵入二弧其大弧弦長二十四步小弧弦長一十八步問大小二弧矢各幾何答曰大弧矢六步小弧矢三步術曰立天元一為大弧矢如積求之得一百四十四為益實三十為從方一為益隅平方開之得大弧矢又立天元一為小弧矢如積求之得八十一為正義三十為益方一為正隅平方開之得小弧矢合問
  hash: sha256:492b5914426728dff1b9cda8f2835adc55f92cdc2f396ebcbbdae303998e2026
