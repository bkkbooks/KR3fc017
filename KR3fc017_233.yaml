body:
  text: 今有圎田一段圎従古法上有圎池圎従甯率中有直池池邊下有方池各占之餘積一千八百六十八步四分九釐五毫二絲只云七池方靣不及一直池長五步四分四釐𨚫多三直池闊二步二分四釐方池靣圎池周和得三十步直池斜與方池羃等問田池周徑長闊各幾何羅文補之答曰圎田徑六十四步圎池周二十二步直池長六十一步四分四釐闊一十七步九分二釐圎池徑七步方池靣八步術曰立天元一為圎池周如積求之得七千七百八十五萬五千一百二十六步八分為正實一千五十五萬三千七百三十四步四分為益方五十三萬二千三百一步五分為従上廉一萬一千八百八十為益下廉九十九為従隅三椉方開之得圎池周餘依加減求之合問今有方田一段內有方池池心復有方亭臺各占之三積共五千五十六尺只云併臺髙臺方為益實二従方一益廉
