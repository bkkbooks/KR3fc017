body:
  text: 之得數加入圎徑共得四十八步問三池積幾何答曰八百五十五步九十七分步之三十六術曰立天元一為𨳩方數如積求之得一百三十八為益實一十七為従方五為益亷一為正隅立方開之得六步以减云數餘為圎田徑又立天元一為容圎池徑如積求之得五千二百九十二為益實二百五十二為従方一為正隅平方開之得池徑不盡命分求池積術曰列池徑通分內子自之於二分母分子相减餘以子乗之加上三之四而一所得為實以分母自之為法實如法而一不盡約之命分三之即三池積合問方方程正負八問今有絲二百七十三兩織錦七匹織綾一匹又絲二百四十七兩織綾八匹織紬一匹又絲二百四十二兩織九匹織錦一匹其錦匹長自乗內减綾匹長餘又自乗內加紬匹長共得三十五萬八千八百二十九尺綾
  hash: sha256:d96683fd9af47af86b7751b5759a585d1b0ca200d9f9c61700db047b17e659c5
