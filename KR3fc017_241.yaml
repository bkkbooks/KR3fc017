body:
  text: 之得數加入圎徑共得四十八步問三池積幾何答曰八百五十五步九十七分步之三十六術曰立天元一為開方數如積求之得一百三十八為益實一十七為從方五為益亷一為正隅立方開之得六步以減云數餘為圎田徑又立天元一為容圎池徑如積求之得五千二百九十二為益實二百五十二為從方一為正隅平方開之得池徑不盡命分求池積術曰列池徑通分內子自之於二分母分子相減餘以子乘之加上三之四而一所得為實以分母自之為法實如法而一不盡約之命分三之即三池積合問方方程正負八問今有絲二百七十三兩織錦七匹織綾一匹又絲二百四十七兩織綾八匹織紬一匹又絲二百四十二兩織九匹織錦一匹其錦匹長自乘內減綾匹長餘又自乘內加紬匹長共得三十五萬八千八百二十九尺綾
  hash: sha256:537c51668ea70b6e044509b67d9e9ca60e1e4c32a83fb7615ba06b8c09a71791
