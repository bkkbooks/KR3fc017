body:
  text: 數餘即甲分層數合問今有四角垛果子一所令甲乙丙分之甲分五百九十箇乙分四百四十六箇丙分二百四箇從下給甲次中與乙次上與丙問各分層數幾何答曰甲三層乙四層丙八層術曰立天元一為共髙層數如積求之得七千四百四十為益實一為從方三為從廉二為從隅立方開之得共髙層數又立天元一為丙分層數如積求之得一千二百二十四為益實一為從方三為從廉二為從隅立方開之得丙分八層又立天元一為乙分層數如積求之得三千九百為益實一為從方三為從廉二為從隅立方開之得一十二層內減乙分層數餘為丙分層數以減共髙餘即甲分層數合問今有三角四角垛果子各一所共積一百一十一箇只云四角底靣不及三角底靣一箇問二底靣各幾何答曰三角底靣六箇四角底靣五箇術曰立天元一為三角底靣如積求之得二百
  hash: sha256:d88cfd2d0cc9dd03ac0dfbf8d892e1d7c3dc588756f057e9d0fdce63bf4174bf
