body:
  text: 答曰圎周三十六步方面一十二步術曰立天元一為開方數如積求之得一萬一百八十八為益寔一千八百八十四為従方一萬四百八十八為従上亷二千七十二為従二亷二百二十五為従三亷四百五十為益下亷七十五為益隅五乗方開之得開方數三步四之卽方田面合問今有方圎田各一段圎従宻率圓田積內加二箇圎田周减一段方田積餘數於上又方田積內加二箇方田靣减一段圎田積餘数加上以方田靣少半乗之又以圎田周六分之一乗之得二千三百四步只云方田面為益寔四為益方三為従亷一為正隅立方開之得数以十八乗之與圓田周等問方面圎周各幾何答曰方面一十二步圎周三十六步術曰立天元一為開方數如積求之得一千一百五十二為益寔五十六為益二亷三十為従三亷一十九為従四亷六為従五亷一為従隅
