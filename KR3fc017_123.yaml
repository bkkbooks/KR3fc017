body:
  text: 答曰圎周三十六步方面一十二步術曰立天元一為開方數如積求之得一萬一百八十八為益實一千八百八十四為從方一萬四百八十八為從上亷二千七十二為從二亷二百二十五為從三亷四百五十為益下亷七十五為益隅五乘方開之得開方數三步四之即方田面合問今有方圎田各一段圎從密率圓田積內加二箇圎田周减一段方田積餘數於上又方田積內加二箇方田靣减一段圎田積餘數加上以方田靣少半乘之又以圎田周六分之一乘之得二千三百四步只云方田面為益實四為益方三為從亷一為正隅立方開之得數以十八乘之與圓田周等問方面圎周各幾何答曰方面一十二步圎周三十六步術曰立天元一為開方數如積求之得一千一百五十二為益實五十六為益二亷三十為從三亷一十九為從四亷六為從五亷一為從隅
