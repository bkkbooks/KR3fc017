body:
  text: 開方數二分之一每日用徒一十九人限一十二日役畢每人日程常積三十二尺問臺高及上下周各幾何羅有得答曰上周四丈八尺下周七丈二尺髙二丈四尺術曰立天元一為開方數如積求之得一十三萬一千三百二十八為益實二十八為從二亷八為益三亷一為正隅四乘方開之得十二為開方數倍之即髙餘依加減求之合問今有造方臺一所共支功食錢二百五十七貫六百二十二文七分文之六只云以臺髙為正實十為益方一為正隅平方開之所得丹為實開平方除之少如先開方數中上方多如先開方數強半上下方和得三十八尺每人日程常積二十八尺每三人支錢二貫四百七十七文七分文之一用徒日自悟令四日役畢問臺上下方髙及逐日用徒支錢各幾何答曰上方一丈六尺下方二丈二尺髙二丈四尺初日二十人五分人之四錢一十七貫一百七十四文七分文之六
