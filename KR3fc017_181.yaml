body:
  text: 截長闊各幾何答曰截長七十五步截闊二十七步術曰立天元一為截長如積求之得二萬五千八百七十五為益實四百二十為從方一為益隅平方開之得截長合問今有圭田一段長一百三十六步闊六十八步今從尖截地二畝四分問截長闊各幾何答曰截長四十八步截闊二十四步術曰立天元一為截長如積求之得二千三百四為益實一為正隅平方開之得截長合問今有圭田一段長一百二十步闊四十八步今欲從闊截賣七畝七十五步問截長闊各幾何答曰截長四十五步截闊三十步術曰立天元一為截長如積求之得一千七百五十五為益實四十八為從方二分為益隅平方開之得截長合問今有圭田長一百七十四步闊五十八步今從東豎截句股積三百三十七步
