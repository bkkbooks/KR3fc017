body:
  text: 九十為従三廉三為正隅四椉方開之得三角撒星底子一十二箇加三即曰數或問還源依立方招兵初招方靣三尺次招方靣轉多一尺得數為兵令招一十五方每人日支錢二百五十文問招兵及支錢各幾何答曰兵二萬三千四百人錢二萬三千四百六十二貫術曰求得上差二十七二差三十七三差二十四下差六求兵者今招為上積又今招減一為茭草底子積為二積又今招減二為三角底子積為三積又今招減三為三角落一積為下積以各差椉各積四位併之即招兵數也求之錢者以今招為茭草積為上積又今招減一為三角底子積為二積又今招減二為落一積為三積又今招減三為三為三角撒星積為下積以各差椉各積四位併之所得又以每日支錢椉之即得支錢之數也合問
