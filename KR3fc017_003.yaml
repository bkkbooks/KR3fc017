body:
  text: 數一而巳一者萬物之所從始故易一太極也一而二二而四四而八生生不窮者豈非自然而然之數邪河洛圗書洰其祕黃帝九章著之書其章有九而其數則二百四十有六始方田終句股包括三才旁通萬有凡言數者皆莫得而逃焉如曆之大衍書之曆象詩之萬億及秭記禮之三千三百周官之三百六十數之見于經者蓋不特黃帝九章為然也自後世明算之科不設而此學寖失其傳由是曆法之進退畸盈農田之方圎曲直以至斗升勺合毫釐絲忽往往皆不能盡其法者又豈非古學之無傳乎學者莫知所依據邪燕山松庭朱先生以數學名家周遊湖海二十餘年矣四方之來學者日衆先生遂發明九章之妙以淑後學為書三卷分門二十有四立問二百八十有八名曰四元玉鑑其法以元氣居中立天元一于下地元一于左人元一于右物元一于上陰陽升降進退左右牙通變化錯綜無窮其于盈絀隱互正負方程演偭開方之術精妙元絶其法能發先賢未盡之旨會萬理而朝元統三才而立極乘除
  hash: sha256:26d7c87f58faa42cf9d03bacd6509e9cda621241c07c5b228249e9723fb78ad9
