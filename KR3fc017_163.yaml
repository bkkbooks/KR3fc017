body:
  text: 或問今有人來贖解本多利少難評共收四貫別無零説破源流即省本利各開方畢併之與日相停𠰥還相減甚分明四十文差餘剩答曰本錢三貫六百文月利四十一文三分文之二兩箇月二十日利錢四百文術曰立天元一為本錢地元一為利錢天地配合求之得一百四十四萬為益實四千為從方一為益隅平方開之得本錢餘依加減求之合問或問元有直田一畝地橫行六步豎行四斜行十五至隅頭借問長平數目事答曰長一十六步闊一十五步術曰立天元一為長地元一為平天地配合求之得五萬七十六百為正實二千八百八十為益方一百七十三為益上亷八為一下廉一為正隅三乘方開之得長又立天元一為闊地元一為長天地配合求之得五萬七十六百為正實一千九百二十為益方一百七十三為益上廉一十二為益下廉一為正隅三乘方開之得闊合問
  hash: sha256:a59f90327533b35d1e96a915c22e9b28b7942b8b5fe0d25d74bfe92613db51ec
