body:
  text: 術曰立天元一為圎田周如積求之得二萬一千九十六為益寔三百一十四為益方二十五為正隅平方開之得圎田周又立天元一為方田靣如積求之得七十三萬二千三百八十四為正寔八千六百八十六為益上亷二十五為正隅三乗方開之得方田面合問今有方圎田各一段圎従宻率方田積內减圓田周圎田積內减方田面餘二數併得一百九十九步一十一分步之一只云圎周羃减方面餘一千二百八十四步問方面圎周各幾何答曰圎周三十六步方面一十二步術曰立天元一為圎田周如積求之得一億四千五百一十七萬七千二百為正寔八十八為益方二十二萬六千六十五為益上亷八十八為正隅三乗方開之得圎周合問今有方圎田各一段圎従古法圎田積加方田面於上又方田積加圎田周內减上餘六十步只云圎周方面相和四十八步問圎周方面各幾何
