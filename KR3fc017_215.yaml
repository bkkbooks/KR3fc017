body:
  text: 闊一箇問上下長闊及髙各幾何答曰上長四箇下長八箇下闊五箇髙五箇術曰立天元一為上長如積求之得一百二十為益實二為從方五為益上廉一為益下廉一為正隅三乘方開之合問今有圎錐垛果子一所令甲乙丙分之甲分五百八箇乙分四百一箇丙分二百一十五箇從上給丙次中給乙次下與甲問各分層數幾何答曰甲三層乙四層丙九層術曰立天元一為丙分層數如積求之得一千七百一十九為益實二為從方三為從廉二為從隅立方開之得丙分層數又立天元一為乙丙共分層數如積求之得四千九百二十七為益實二為從方三為從廉二為從隅立方開之得一十三層內減丙分層數餘即乙分層數又立天元一為共髙層數如積求之得八千九百九十二為益實二為從方三為從廉二為從隅立方開之得共髙一十六層內減乙丙層
