body:
  text: 為正實三十六為正方一為正隅平方開之得弦合問今有積減平以積乘之又減五平四積餘二十七萬九千六百三十步只云長取五分之一平取三分之二其長分子數如平分子數二分之一問長平各幾何答曰平一十八步長三十步術曰立天元一為平如積求之得五十萬三千三百四十步為益實九為益方一十二為益上廉三為益下廉五為正隅三乘方開之得平合問今有積幂減二長一平餘四萬六千五百七十八步只云平自乘與長等問長平各幾何答曰平六步長三十六步術曰立天元一為平如積求之得四萬六千五百七十八為益實一為益方二為益上廉一為正隅五乘方開之得平合問今有積加一長二平三和四較自乘減一和二較三平四長餘一十五萬五千八百五
  hash: sha256:b8bb650ef50ee372792b5880d41e13687f0138d49df5e53ccac1a69c4ad238bd
