body:
  text: 為正實三十六為正方一為正隅平方開之得弦合問今有積減平以積椉之又減五平四積餘二十七萬九千六百三十步只云長取五分之一平取三分之二其長分子数如平分子数二分之一問長平各幾何荅曰平一十八步長三十步術曰立天元一為平如積求之得五十萬三千三百四十步為益實九為益方一十二為益上廉三為益下廉五為正隅三椉方𨳩之得平合問今有積幂減二長一平餘四萬六千五百七十八步只云平自椉與長等問長平各幾何荅曰平六步長三十六步術曰立天元一為平如積求之得四萬六千五百七十八為益實一為益方二為益上廉一為正隅五椉方開之得平合問今有積加一長二平三和四較自椉減一和二較三平四長餘一十五萬五千八百五
  hash: sha256:c698b4be767e55abc77a6e4d6b09cb4373504d7d3de5d5b1e9b8c70fddde546c
