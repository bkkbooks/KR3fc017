body:
  text: 方開之得茭草一十五朿加一即日數米求日者立天元一為三角底子如積求之得八萬四百為益實五百九十為從方二百一十三為從廉七為從隅立方開之得三角底子一十五箇加一即日數合問今有官司依平方招兵初段方面四尺次日方靣轉多二尺每人日給銀一兩二錢已招兵四千九百五十六人支銀二萬六千四十兩問招來幾日答曰一十四日術曰立天元一為三角底子如積求之得七千三百五十六為益實七十三為從方二十一為從廉二為從隅立方開之得三角底子一十二箇加二即日數銀求日數日立天元一為三角落一底子如積求之得六萬四千八百九十六為益實二百三十六為從方九十五為從上廉一十六為從下廉一為從隅三乘方開之得三角落一底子一十二箇加二即日數合問今有官司依圎箭朿招兵初朿外周一十二隻次朿外周轉多六隻每人日給米四升
