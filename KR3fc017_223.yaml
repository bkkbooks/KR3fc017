body:
  text: 廉一千一十六為益五廉二百九十二為從六廉三十九為益下廉二為從隅八乘方開之合問今有三角四角果子各一所共積二百一十一箇只云三角底子一層之數與四角底子一層之數等問各幾何答曰三角底靣八箇四角底靣六箇術曰立天元一為三角底子如積求之得六百四十一萬一千二十四為正實三萬五千四百五十為益方四萬五千五百三十三為益上廉一萬一千二為益二廉九十九為從三廉三十為從下廉二為正隅五乘方開之合問鎖套吞容一十九問今有圎田一段內有圎池占之餘積六百一十二步只云實徑自乘不及內周四十八步𨚫與內外周差等問三事各幾何答曰實徑六步內周八十四步外周一百二十步術曰立天元一為實徑如積求之得二千四百四十八為益實三十二為從上廉一為從隅三
