body:
  text: 亦滿二斤半丙云得甲乙絲各三分之二亦滿二斤半其絲丙價取少半自乘內減太半兩價餘又自乘內加太半兩價共得二千八百二十二貫四百八十四文問絲及斤價各幾何答曰甲一斤半乙一斤二兩丙一十二兩斤價二貫一十六文術曰置絲通兩各以分母乘之如方程正負術入之左行得丙絲中行得乙絲右行得甲絲立天元一為少半兩價如積求之得二百八十二萬二千四百八十四為益實二為從方四為從上亷四為益下亷一為正隅三乘方開之得四十二文以四十八乘之即斤價合問今有三斜田一段只云併大斜一中斜二減小斜四餘一十五步又併大斜二小斜三減中斜五少一十五步又併中斜二小斜一減大斜二餘一十五步問中股幾何答曰中股三十六步
  hash: sha256:9c2028d885ceb1fe0e6bb2dfcc18de24ac401df9fd47a48b32a766c5bd499a68
