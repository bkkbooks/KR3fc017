body:
  text: 亦滿二斤半丙云得甲乙絲各三分之二亦滿二斤半其絲丙價取少半自乘內减太半两價餘又自乘內加太半两價共得二千八百二十二貫四百八十四文問絲及斤價各幾何答曰甲一斤半乙一斤二两丙一十二两斤價二貫一十六文術曰置絲通两各以分母乘之如方程正負術入之左行得丙絲中行得乙絲右行得甲絲立天元一為少半两價如積求之得二百八十二萬二千四百八十四為益實二為従方四為従上亷四為益下亷一為正隅三乘方開之得四十二文以四十八乗之即斤價合問今有三斜田一段只云併大斜一中斜二减小斜四餘一十五步又併大斜二小斜三减中斜五少一十五步又併中斜二小斜一减大斜二餘一十五步問中股幾何答曰中股三十六步
  hash: sha256:60ccf08820a0885d93cd2dfe5cf17a2b916a69d6be8895fe9892a7c0e3180433
