body:
  text: 術曰立天元一為倉長如積求得二千一百六十為益實九為従方六為益亷一為正隅立方開之得倉長合問今有圎囤貯粟三百六十四斛五分斛之四只云上周如下周太半髙如下周少半問周髙各幾何答曰上周二丈四尺下周三丈六尺髙一丈二尺術曰立天元一為上周如積求之得一萬三千八百二十四為益實一為正隅立方開之得上周合問今有圓囤髙一丈二尺周四丈八尺盛粟滿中而適盡只云今己運出三百八十四斛問餘粟殘深幾何答曰殘深七尺術曰立天元一為殘深如積求之得一千八十為益實一百四十四為従方開無隅平方而一得殘深合問今有方倉圓囤各一所貯粟三千三百一十二斛只云倉廣少扵倉長四尺多於倉深二
  hash: sha256:15148c6d280955a764a402cacf74512ef28d68c867cd09b8d3f717e3dda137e7
