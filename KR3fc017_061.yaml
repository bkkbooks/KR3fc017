body:
  text: 荅曰周三十六步徑一十六步術曰立天元一為上周如積求之得一萬二千八百一十六為正實四千七十二為従方二百三十一為益廉三為正隅立方𨳩之得上周合問今有畹田積加下周幂少半減畹徑幂太半餘二千七百九十五步弱半步只云下周為實二為従方一為従隅平方開之又畹徑減二餘以平方開之少如先開方數二步問周徑幾何荅曰周九十九步徑五十一步術曰立天元一為先𨳩方数如積求之得三萬三千八百三十一為益實四百二十為従方二百一十四為益上廉七十四為従下廉一為益隅三椉方𨳩之得九步為先𨳩方数合問今有毬露錢田積加靣徑減圎周餘五十六步只云虛徑多如靣徑二步問三徑各幾何荅曰靣徑四步虛徑六步
  hash: sha256:ed2c933bda1d401a449e29998cda4a98e2ff4c7af3dec82cbbbd2cdb53652524
