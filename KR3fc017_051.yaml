body:
  text: 三廉五百四十四為益四廉五百一十二為從五廉三百八十四為益六廉一百六十為從七廉六十四為益下廉一十六為正隅九乘方開之得三步為開方數四之即平合問混積問元一十八問今有直田積加斜幂減平幂餘半之腹減斜幂六六十七步只云斜較相和二十步問斜長幾何答曰一十三步術曰立天元一為斜長如積求之得二萬二千一百七十八為正實五千三百二十為益方四百九十九為從上廉三十為益下廉一為正隅三乘方開之得斜合問今有方田幂加斜長減方周餘以方靣乘之減方靣餘二千七百七十五步問方靣幾何答曰一十五步術曰立天元一為方靣如積求之得一萬三千八百七十五為益實五為益方一十三為益廉五為正隅立方開之得方靣合問今有句股田積加弦和和得一百四十步只云句股較一十七步問股幾何答曰二十四步
