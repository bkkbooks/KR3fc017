body:
  text: 次日四十一人五分人之三錢三十四貫三百四十九文七分文之五三日八十三人五分人之一錢六十八貫六百九十九文七分文之三末日一百六十六人五分人之二錢一百三十七貫三百九十八文七分文之六術曰立天元一為後開方數如積求之得六千五百五十二為益實三千六百一十為從上亷七百四十一為益三亷七十八為從五亷四為益隅七乘方開之得二尺為後開方數倍之即先開方數四之為臺上方餘依加減求之每日用徒及錢者如法求之合問和分索隱一十三問今有句三步十分步之九股五步五分步之一問弦幾何答曰六步二分步之一術曰立天元一為弦如積求之得一十萬五千六百二十五為益實二千五百為從隅平方開之得弦不盡按連枝同體術求之合問今有股五步五分步之一弦六步二分步之一問句幾何答曰三步十分步之九術曰立天元一為句如積求得一千五百二十一
