body:
  text: 二十二為益實一為從方一為從隅立方開之得三角底靣合問今有三角四角垛果子各一所四角積內減三角積餘二十箇只云三角四角底靣和得一十五箇問各幾何答曰四周底靣七箇三角底靣八箇術曰立天元一為四角底子如積求之得一千四百為益實二百五十六為從方一十五為益廉一為正隅立方開之合問今有三周垛果子三所四角垛果子六所共積一千二百七十二箇只云四角底靣乘三角底靣得四十八箇問各幾何答曰四角底靣四箇三角底靣十二箇術曰立天元一為四角底子如積求之得五萬五千二百九十六為正實三千四百五十六為從方四十八為從上廉一千二百七十二為益二廉一為從三廉三為從下廉二為從隅五乘方開之合問今有三角垛果子二所四角垛果子三所共積六百五十二箇只云三角底靣除四角
