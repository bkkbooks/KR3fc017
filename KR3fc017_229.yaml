body:
  text: 七萬七千六百六十四為益實五千九十一步二分為從方五步七分六釐為從隅平方開之合問今有圎田一段西邊被水侵入一弧外有殘周五十三步弦長二十步問圎徑弧背矢闊各幾何答曰圎徑二十五步矢闊五步弧背二十二步術曰立天元一為水侵弧矢如積求之得三萬為正實七千三百為益方六百為從上廉七十三為益下廉一為正隅三乘方開之得矢闊又矢除半弦羃加矢即圎田徑又倍矢羃以圎徑餘之為弦背差加弦即弧背合問今有方田一段西北隅被水侵占之餘積七千一百一十二步半只云東南隅斜至水楞一百八步半問田方及水長各幾何答曰田方八十五步水長二十一步術曰立天元一為田方靣如積求之得一萬九千一百二十五為正實三百一十為益方一為正隅平方開之所得七之五而一為田斜內減
