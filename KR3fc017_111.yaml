body:
  text: 太半如方箭外周中半三角四角底靣相和得三十三箇平圎徑多於四角底靣七分之四問九事各幾何答曰三角底子一十五箇四角底子一十八箇方箭外周二十四隻圎箭外周一十二隻平圎徑四十二尺立圎徑一十六尺平方靣三十五尺立方靣一十四尺茭草底子一十六朿術曰立天元一為三角底子如積求之得二百八十四萬六千八百三十五為正實六十萬八千四百三十九為益方一萬八千八百六十五為從亷六百三為從隅立方開之得三角底子又立天元一為四角底子如積求之得二千四百九十八萬二十三百四十四為正實二百六十萬六千六百五十二為益方七萬八千五百六十二為從亷六百三為益隅立方開之得四角底子又立天元一為方箭外周如積求之得八千八百八十二萬六千一百一十二為正實六百九十五萬一千七十二為益方一十五萬七千一百二十四為從亷九百單四半為益
