body:
  text: 兩儀化元今有股羃減弦較較與股椉句等只云句羃加弦較和與句椉弦同問股幾何荅曰四步草曰立天元一為股地元一為句弦和天地配合求之求到每隱通分消得今式云式之內二行得太二行得太兩位相消得開方式平方開之得股四步合問細草曰立天元一太為股地元一太為句兩元相減得弦較較以減股羃餘倍之寄左天元自乗地元除之得句弦較以減地元得倍句太以天元乗之與左相消倍句自得等數求得今式之得四句兩元相加以倍句羃得弦和和減之得為弦較和加四句倍句倍四因之得羃寄左弦相乗
  hash: sha256:674fc0ac6ce158e5d064ba194fa4718a65a7109052272539b945d51a5f33c28d
