body:
  text: 加大較如大長而一加大長得八步問長平各幾何答曰平三步長六步術曰立天元一為平地元一為長天地配合求之得五萬六百八十八為益實一千七百二十八為從方一萬七千一百五十二為從上亷一千七百七十六為益二亷一千二百八為益三亷四百九十一為從四亷一百七十為益五亷五十三為益六亷二十七為從七亷二為從八亷一為益隅九乘方開之得平合問今有句弦相乘加句股較平方開之與股適等只云股弦相乘减弦和和立方開之與句弦較同問句弦各幾何答曰句三步股四步術曰立天元一為句地元一為股弦較天地配合求之得六為益實一十四為從方一百一十為從上亷六百二十為益二亷一千五百二十為從三亷二千四百四十六為益四亷二千七百四十七為從五亷一千九百三十二為益六亷六百七十一為從七亷二十二為從八亷六
