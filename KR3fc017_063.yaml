body:
  text: 通徑一十四步術曰立天元一為靣徑如積求之得一百二十八為益實一十二為益方一十一為正隅以平方開之得靣徑四步合前問今有弧田積加矢立幂減弦平幂餘以矢除之加矢立幂得五千九百一十三步只云矢除弦得四步問弦矢各幾何答曰矢一十八步弦七十二步術曰立天元一為矢如積求之得一萬一千八百二十六為益實二十七為益方二為從廉二為正隅立方開之得矢合問今有車𨋹田積以徑乘內周加之以外周乘徑減之又以徑幂乘之減徑幂餘三千五百二十八步只云徑幂多如外周六步內外周差九步問各幾何答曰實徑六步內周二十一步外周三十步術曰立天元一為𨋹徑如積求之得三千五百三十八為益實一為益上廉一十九步半為益二廉一為正隅四乘方開之得實徑合問今有錢田積幂加一池方靣減四錢田積餘一十
