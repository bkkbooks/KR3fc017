body:
  text: 益實一為正隅平方開之得句立天元一為股如積求之得一千二百二十五為益實一為正隅平方開之得股立天元一為弦如積求之得一千三百六十九為益實一為正隅平方開之即弦合問今有平圎立圎平方立方各一所只云平圎積求九分之一立圎積取九分之二平方積取五分之三减立方積九分之八盈二尺又平圎積取九分之一立方積取九分之二立圎積取四分之一减于平方積五分之四不足二尺又立圎積取四分之一立方積取九分之二平方積取五分之一减平圎積三分之二盈二尺又平方積取五分之一立方積取九分之四平圎積取二分之一减于立圎積九分之七不足二尺其立圎徑不及平方靣一尺却多立方靣一尺如平圎徑三分之二問四事各幾何
