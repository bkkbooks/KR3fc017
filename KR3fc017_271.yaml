body:
  text: 答曰二十步術曰立天元一為弦較和地元一為較天地配合求之得一萬四千四百為益實二百四十為從上亷一為益隅三乘方開之合問今有句股積三十步只云句股和一十七步問句股較幾何答曰七步術曰立天元一為句股較地元一為句天地配合求之得四十九為益實一為正隅平方開之得七步合問今有句股積三十步只云句股和一十七步問句答曰八步術曰立天元一為句弦較地元一為句天地配合求之得三千六百為益實三千七百六為從方七十一為益上亷三十四為益下亷一為益隅三乘方開之合問今有句股積三十步只云句股和一十七步問股弦較幾何答曰一步
