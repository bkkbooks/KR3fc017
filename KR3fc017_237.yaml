body:
  text: 二千七百六十八為益實二千五百四十四為益方一千八百八十八為從上亷六百一十六為益二亷七十二為從下亷一為正隅四乘方開之得臺髙合問今有圭田一段闊一十四步長二十四步於內欲容圎池一所問池徑幾何答曰一十步二分步之一術曰立天元一為容池圎徑如積求之得一千一百七十六為益實四十九為從方六為從益隅平方開之合問今有句股田一段句闊一十八步股長二十四步今欲從句內容圓池一所問容池周幾何答曰三十六步術曰立天元一為容池周如積求之得七千七百七十六為正實二百五十二為益方一為正隅平方開之合問今有句股田一段句闊六步股長一十二步今欲從句容方池一所問容方面幾何答曰四步
  hash: sha256:f1d7609512d4bc35d26b7d262d5e629baf88dc98e28ddbb9a5126ad48670222c
