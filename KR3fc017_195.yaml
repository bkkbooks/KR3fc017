body:
  text: 徑羃餘爲實開平方卽小弧弦合問今有圎田一段內復有圎池占之二圎皆依古法餘地八畝強半畝只云環之實徑自乘多於通徑二十步今欲従西監截車輞積五百三十八步問截池弦池矢及內外周兩頭博徑各幾何答曰截池矢六步池弦三十六步內周三十七步二分外周七十步四分博徑一十四步實徑一十步術曰立天元一爲環之實徑如積求之得七百爲益實二十爲益方一爲益廉一爲従隅立方開之得實徑求得通徑八十步池徑六十步又輞之輞積以實徑而一得一百七步六分爲車輞內外周相和之數又立天元一爲截池矢如積求之得一兆四十九千九萬七千九百一十七億五千五百五十九萬一千九百三十六爲正實二十五百五十八萬三千億三千九百八十三萬八十七百二十爲益方一十八萬七千八百二十九億八千四百六千三萬一十六爲従上廉二萬七千六百五十四億五千三百
