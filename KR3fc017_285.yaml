body:
  text: 今有直積减小平加大較小和多積五步只云二大和减小長大平少積五步問長平各幾何答曰平三步長六步術曰立天元一為平地元一為長天地配合求之得一十五為益實二為從方一為從隅平方開之得平合問今有直積平方𨳩之减平餘有三步只云長以平方開之不及較三步問長平各幾何答曰平九步長一十六步術曰立天元一為平地元一為長天地配合求之得八十一為正實四十五為從方三為從亷一為益隅立方𨳩之得平合問今有直積加和各以平方𨳩之所得相併减平餘八步只云長以平方開之少如和開方數一步問長平各幾何答曰平九步長一十六步術曰立天元一為平地元一為和𨳩方數天地配合求之得二百二十五為正實一百九十六為益方二十六為益上亷四為益下亷一為正
  hash: sha256:317f9fb8fd20c37e0b48b865384c572d5343fb0f7c80c8add838368d1fdf2086
