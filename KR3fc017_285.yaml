body:
  text: 今有直積減小平加大較小和多積五步只云二大和減小長大平少積五步問長平各幾何答曰平三步長六步術曰立天元一為平地元一為長天地配合求之得一十五為益實二為從方一為從隅平方開之得平合問今有直積平方開之減平餘有三步只云長以平方開之不及較三步問長平各幾何答曰平九步長一十六步術曰立天元一為平地元一為長天地配合求之得八十一為正實四十五為從方三為從亷一為益隅立方開之得平合問今有直積加和各以平方開之所得相併減平餘八步只云長以平方開之少如和開方數一步問長平各幾何答曰平九步長一十六步術曰立天元一為平地元一為和開方數天地配合求之得二百二十五為正實一百九十六為益方二十六為益上亷四為益下亷一為正
  hash: sha256:f672aa00c26eba5e28241e55f0082564c9539fd59ee8e4feef54d26f11ae79b4
