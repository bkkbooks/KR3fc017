body:
  text: 六十八為從二亷九十六為從三亷六百五十六為益四亷四十八為從隅五乘方開之合問今有五和併三事與四直積加二句等只云三事減五較與四相和常例五和五較四和者句股弦黃方減股羃同問句股弦和五事事連環得幾何答曰二十步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得七千六百八十為正實七萬五千五百八十四為益方一十一萬八千一百六十為從上亷五千七百八十為從二亷二千三百七十五為益三亷七十益四亷八為正隅五乘方開之合問今有句股弦各自乘減五和與倍之黃方羃適等只云五和加二句二股羃減八弦與半之五較羃少弦和較相同問立方開十三事得幾何答曰四步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得三千七十二
  hash: sha256:1cef7c9b247ef65c6f42feadc00b2eb67d9865befbcb4fd6b1fc3967c01e7ee9
