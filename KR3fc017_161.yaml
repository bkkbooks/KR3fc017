body:
  text: 術曰立天元一為椽數如積求之得二千七十為益實一為益方一為從隅平方開之得椽數又立天元一為每株椽價如積求之得一萬八千六百三十為益實三為從方一為正隅平方開之合問或問方城里周六十四假使金磚遍鋪地每條均鑄厚一寸長闊相和恰一尺寸金十五兩為法尚帶零株一十八每磚計重十七斤一十五兩六銖答七絲二在其中共是一磚之重率長闊余磚用幾何惱得先生沒亂殺答曰闊二寸四分長七寸六分磚四十五億四千七百三十六萬八千四百二十一枚一十九分枚之一重八百一十六億四千八百萬斤術曰立天元一為磚闊如積求之得一十八寸二分四釐為正實一十寸為益方一寸為正隅平方開之得磚闊求磚數者以寸畝法通城積為實以一磚之積寸為法實如法而一不盡約之為分合問
