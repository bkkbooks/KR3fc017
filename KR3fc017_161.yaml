body:
  text: 術曰立天元一爲椽数如積求之得二千七十爲益實一爲益方一爲従隅平方開之得椽数又立天元一爲每株椽價如積求之得一萬八千六百三十爲益實三爲從方一爲正隅平方開之合問或問方城里週六十四假使金塼遍鋪地每條均鑄厚一寸長闊相和恰一尺寸金十五两爲法尙帶零株一十八每塼計重十七斤一十五两六銖答七絲二在其中共是一塼之重率長闊余磚用幾何惱得先生没亂殺答曰闊二寸四分長七寸六分塼四十五億四千七百三十六萬八千四百二十一枚一十九分枚之一重八百一十六億四千八百萬斤術曰立天元一爲塼闊如積求之得一十八寸二分四釐爲正實一十寸爲益方一寸爲正隅平方開之得塼闊求塼数者以寸畝法通城積爲實以一塼之積寸爲法實如法而一不盡約之爲分合問
