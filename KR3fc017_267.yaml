body:
  text: 今有密率弧田積一百三十六步半只云矢羃多於弦二十一步問弦矢各幾何答曰矢七步弦二十八步術曰立天元一為矢如積求之得七千二百三為益實四百八十八為益方一十四為益上亷二十八為從下亷一為正隅三乘方開之得矢七步合問今有立方立圎平方各一所共積二萬九千九百八十四尺只云立圎徑如立方面七分之六平方面如立圎徑三分之二問三事各幾何答曰立圎徑二十四尺立方靣二十八尺平方靣一十六尺術曰立天元一為立圎徑如積求之得一千二百九十五萬三千八十八為益實一百九十二為從亷九百二十九為從隅立方開之得立圎徑合問兩儀合轍一十二問今有句股積三十步只云句股和一十七步問句弦和幾何
  hash: sha256:8bc3b07d6ff60c8e85349e649e648b565d755c51a1855ff445f83d07b24ba9e8
