body:
  text: 九百三十七為益實四十一為從方開無隅平方而一得梨又立天元一為果數如積求之得一萬四千六十三為正實四十一為益方上實下法而一得果又立天元一為犂價如積求之得三萬二千九百二十三為正實四十一為益方開無隅平方除之得梨又立天元一為果價如積求之得八十三十六為正實四十一為益方上實下法而一合問或問院內鞦韆蹴起杆索未審髙低腳登𦘕板女嬌嬉離地板髙一尺只見送行兩步板髙三尺無奇杆繩長短怎生知除演天元如積答曰杆長二丈七尺索長二丈六尺術曰立天元一為杆長如積求之得一百八為正實四為益方開無隅平方除之得杆長又立天元一為索長如積求之得一百四為正實四為益方上實下法而一合問或問六貫二百一十錢倩人去買幾株椽每株腳錢三文足無錢準與一株椽答曰椽四十六株株價一百三十五文
