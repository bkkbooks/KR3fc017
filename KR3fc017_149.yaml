body:
  text: 四十為正實四十為益方上實下法而一得城髙求表去城者以前表退行乘表問為實兩表退行差為法實如法而一合問今有方城上有戍樓不知髙逺立兩表齊髙一丈五尺表問相去八十步令前表與後表參相直人目髙四尺於前表退行三十步遙望樓岑與前表末參合復望樓足入表五尺六寸又從後表退行五十步遙望樓岑與後表末參合問城樓答髙幾何答曰樓髙二丈八尺城髙三丈一尺術曰立天元一為樓髙如積求之得二千八百為益實一百為從方開無隅平方而一得樓髙求城髙者置表髙减人目及入表餘乘表閒為實以兩表退行相多為法實如法而一合問今有方城不知大小立兩表東西相去四十三步二分齊人目以索連之令東表與城東南隅及東北隅參相直於東表退行一十四步八分遙望城西北隅入索東端一十步又却此行去表六十
