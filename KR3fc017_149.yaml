body:
  text: 四十爲正實四十爲益方上實下法而一得城髙求表去城者以前表退行乗表問爲實两表退行差爲法實如法而一合問今有方城上有戍樓不知髙逺立两表齊髙一丈五尺表問相去八十步令前表與後表參相直人目髙四尺於前表退行三十步遥望樓岑與前表末參合復望樓足入表五尺六寸又從後表退行五十步遥望樓岑與後表末參合問城樓答髙幾何答曰樓髙二丈八尺城髙三丈一尺術曰立天元一爲樓髙如積求之得二千八百爲益實一百爲從方開無隅平方而一得樓髙求城髙者置表髙减人目及入表餘乗表閒爲實以两表退行相多爲法實如法而一合問今有方城不知大小立两表東西相去四十三步二分齊人目以索連之令東表與城東南隅及東北隅參相直於東表退行一十四步八分遥望城西北隅入索東端一十步又却此行去表六十
