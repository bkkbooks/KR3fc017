body:
  text: 實二千四百五十為從方一千三百八十六為益上廉二百九十五為從二廉二十八為益下廉一為正隅四乘方開之得平合問今有積加一和三較以積乘之減一長二較又長乘之得一十四萬七千二百一十六步只云平以立方開之如長六分之一問長平各幾何答曰平八步長一十二步術曰立天元一為開方數如積求之得一萬二千二百六十八為益實九為益上廉一為從三廉七十二為從五廉六為益七廉一十八為正隅八乘方開之得二步即開方數六之得長今有積以和乘之減積餘以平求之加和得一十七萬七千一百六十二步只云和為益實四為益方三為從上廉二為益下廉一為正隅如平四分之一問長平各幾何答曰平一十二步長三十步術曰立天元一為開方數如積求之得一十七萬七千一百六十二為益實四為益方三為從上廉一百二十六為從二廉四百六十五為從
